# Tinyproxy config — leichter HTTP-Proxy als Bridge zwischen scan-worker
# Tools (HTTPS_PROXY=http://vpn-gw:3128) und dem aktuellen Routing
# (=ExpressVPN-Tunnel wenn connected).

User tinyproxy
Group tinyproxy
Port 3128
Listen 0.0.0.0
Timeout 60
DefaultErrorFile "/usr/share/tinyproxy/default.html"
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Connect
PidFile "/run/tinyproxy/tinyproxy.pid"
MaxClients 100

# Erlaube Verbindungen aus dem proxy-net Docker-Netzwerk
Allow 0.0.0.0/0

# CONNECT-Methode fuer HTTPS — alle Ports (Tools probieren auch 8080/8443)
ConnectPort 80
ConnectPort 443
ConnectPort 8080
ConnectPort 8443
ConnectPort 3000
ConnectPort 3001
ConnectPort 5000
ConnectPort 5001
ConnectPort 9000
ConnectPort 9090

# Wir setzen den Via-Header NICHT (vermeidet WAF-Detection)
DisableViaHeader Yes
