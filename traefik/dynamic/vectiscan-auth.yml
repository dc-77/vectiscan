# VEC-439 C3 / VEC-442 C6 — Keycloak-SSO via oauth2-proxy (forwardAuth).
#
# Schuetzt status.vectigal.tech (Kuma) und scan.vectigal.tech/admin (Frontend).
# Grafana (logs.vectigal.tech) nutzt natives OIDC (VEC-438 C2) — kein
# forwardAuth dort noetig. API /api/admin bleibt App-JWT (VEC-370).
#
# Diese Datei wird vom CI-Job `ops-traefik-auth` in den host-eigenen Traefik-
# File-Provider (`/opt/traefik/config`, directory + watch:true) geschrieben.
# Kein Credential-Platzhalter mehr (Basic-Auth entfernt in VEC-442 C6).
#
# Backend-Service `oauth2-proxy` zeigt auf den gleichnamigen Compose-Container
# (Profil sso, proxy-net). Kette: forwardAuth -> /oauth2/auth. 401 -> Redirect
# auf /oauth2/sign_in?rd={url} -> Keycloak-Realm `vectiscan`.
#
# Rollback-Weg (Sekunden): Router-Label auf Vorg.-Commit zuruecksetzen +
# `docker compose up -d --no-build frontend uptime-kuma` (watch:true hot-reload).
http:
  middlewares:
    # VEC-439 C3 — Forward-Auth-SSO via oauth2-proxy (Keycloak-Realm vectiscan).
    #
    # Kette: forwardAuth ruft /oauth2/auth. 401 (nicht eingeloggt) faengt die
    # errors-Middleware ab und leitet auf /oauth2/sign_in?rd={url} -> Keycloak.
    # API /api/admin bleibt BEWUSST aussen vor (App-JWT, VEC-370) — kein
    # forwardAuth dort, sonst bricht SPA-fetch() (302->HTML statt 401-JSON).
    oauth2-proxy-auth:
      forwardAuth:
        address: http://oauth2-proxy:4180/oauth2/auth
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Preferred-Username
          - X-Auth-Request-Groups

    oauth2-proxy-errors:
      errors:
        status:
          - "401"
        service: oauth2-proxy
        query: "/oauth2/sign_in?rd={url}"

    oauth2-proxy-redirect:
      chain:
        middlewares:
          - oauth2-proxy-errors
          - oauth2-proxy-auth

  services:
    # Backend fuer die errors-Middleware (serviert /oauth2/sign_in aus oauth2-proxy).
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: http://oauth2-proxy:4180
