# VEC-143 — Edge-Auth-Gating fuer die internal-only-Flaechen.
#
# Warum: Die IP-Allowlist `internal-only@file` ist auf vectigal-docker02
# strukturell WIRKUNGSLOS — `/etc/docker/daemon.json` hat `iptables: false`,
# wodurch der userland docker-proxy jede Quell-IP per SNAT auf das
# Bridge-Gateway 172.18.0.1 umschreibt. 172.18.0.1 liegt in 172.16.0.0/12,
# also gilt JEDER Request (intern wie extern) als "intern" und 403 feuert nie.
# Ein ipStrategy/trustedIPs-Fix ist mangels echter Client-IP / X-Forwarded-For
# unmoeglich. Board-approved Fix (VEC-143 Option C): Auth-Gating statt IP.
#
# Diese Datei wird beim Deploy ADDITIV in den host-eigenen Traefik-
# File-Provider (`/opt/traefik/config`, directory + watch:true) geschrieben.
# Sie laesst das host-eigene `security.yml` (security-headers, rate-limit,
# internal-only) UNANGETASTET — Blast-Radius nur die vectiscan-Router.
#
# Der Platzhalter __TRAEFIK_INTERNAL_HTPASSWD__ wird vom CI-Job `ops-traefik-auth`
# aus der maskierten Pipeline-Variable TRAEFIK_INTERNAL_HTPASSWD ersetzt
# (Format `user:hash`, apr1/bcrypt). KEIN Credential im Repo.
http:
  middlewares:
    internal-auth:
      basicAuth:
        realm: "Vectigal Intern"
        removeHeader: true
        users:
          - "__TRAEFIK_INTERNAL_HTPASSWD__"

    # VEC-439 C3 — Forward-Auth-SSO via oauth2-proxy (Keycloak-Realm vectiscan).
    #
    # Loest die Basic-Auth-Popups (internal-auth, oben) fuer status.vectigal.tech
    # (Kuma) und scan.vectigal.tech/admin (Frontend) durch echtes SSO ab. Die
    # internal-auth-Middleware bleibt definiert -> Rollback = Router-Label
    # zurueck auf internal-auth@file (Two-way-door).
    #
    # Backend-Service `oauth2-proxy` (unten) zeigt auf den gleichnamigen Compose-
    # Container (Profil sso, proxy-net). Host-Traefik erreicht ihn ueber proxy-net
    # per Docker-DNS. WICHTIG: greift nur, wenn der oauth2-proxy-Container laeuft
    # (via ops-keycloak-provision gestartet, persistent ueber Default-Deploys).
    #
    # Kette: forwardAuth ruft /oauth2/auth. 401 (nicht eingeloggt) faengt die
    # errors-Middleware ab und leitet auf /oauth2/sign_in?rd={url} -> Keycloak.
    # API /api/admin bleibt BEWUSST aussen vor (App-JWT, VEC-370) — kein
    # forwardAuth dort, sonst bricht SPA-fetch() (302->HTML statt 401-JSON).
    oauth2-proxy-auth:
      forwardAuth:
        address: http://oauth2-proxy:4180/oauth2/auth
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Preferred-Username
          - X-Auth-Request-Groups

    oauth2-proxy-errors:
      errors:
        status:
          - "401"
        service: oauth2-proxy
        query: "/oauth2/sign_in?rd={url}"

    oauth2-proxy-redirect:
      chain:
        middlewares:
          - oauth2-proxy-errors
          - oauth2-proxy-auth

  services:
    # Backend fuer die errors-Middleware (serviert /oauth2/sign_in aus oauth2-proxy).
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: http://oauth2-proxy:4180
