networks:
  proxy-net:
    external: true
  vectiscan-internal:
    driver: bridge

volumes:
  vectiscan-pg-data:
  vectiscan-redis-data:
  vectiscan-minio-data:

services:
  frontend:
    image: ghcr.io/dc-77/vectiscan/frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://scan-api.vectigal.tech
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-web.rule=Host(`scan.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-web.middlewares=security-headers@file,rate-limit@file,internal-only@file"
      - "traefik.http.services.vectiscan-web.loadbalancer.server.port=3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  api:
    image: ghcr.io/dc-77/vectiscan/api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@vectigal.tech}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-api.rule=Host(`scan-api.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-api.middlewares=security-headers@file,rate-limit@file,internal-only@file"
      - "traefik.http.services.vectiscan-api.loadbalancer.server.port=4000"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.interval=15s"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  # Worker 1 — legacy ZAP_BASE_URL fallback; pool mode activated via
  # ZAP_POOL_ENABLED=true once all four daemons are healthy (see §11.3).
  # ─────────────────────────────────────────────────────────
  # vpn-gw — adaptiver VPN-Proxy (PR-VPN, 2026-05-03)
  # Default OFF; aktiv wenn EXPRESSVPN_ACCESS_TOKEN gesetzt + VPN_ENABLED=true
  # Tinyproxy auf 3128 als HTTP-Proxy, control-api auf 8080 fuer connect/disconnect.
  # Fallback wenn keine .deb / kein Token: Tinyproxy startet trotzdem und leitet
  # den Verkehr direkt durch (= ohne VPN-Schutz, aber kein Service-Bruch).
  # ─────────────────────────────────────────────────────────
  vpn-gw:
    build: ./vpn-gw
    image: ghcr.io/dc-77/vectiscan/vpn-gw:${TAG:-latest}
    restart: unless-stopped
    environment:
      EXPRESSVPN_ACCESS_TOKEN: ${EXPRESSVPN_ACCESS_TOKEN:-}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - vectiscan-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scan-worker-1:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-1:8090
      WORKER_ID: scan-worker-1
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-1:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-1:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Worker 2 — see scan-worker-1 comment.
  scan-worker-2:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-2:8090
      WORKER_ID: scan-worker-2
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-2:
        condition: service_healthy
    networks:
      - vectiscan-internal

  # Worker 3 — pool-only (no dedicated legacy ZAP). Depends on zap-3 for
  # readiness gating but uses the shared pool once ZAP_POOL_ENABLED=true.
  scan-worker-3:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-3:8090
      WORKER_ID: scan-worker-3
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-3:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-2:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Pool-Expansion: zap-3 + zap-4 treten dem ZAP-Pool bei. Erst nach
  # ZAP_POOL_ENABLED=true auf den Workern werden sie genutzt.
  zap-3:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  zap-4:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Precheck-Worker: validiert Multi-Target-Eingaben vor Admin-Review.
  # Nutzt scan-worker-Image mit alternativem Entrypoint. Keine ZAP-Dependency.
  precheck-worker-1:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    entrypoint: ["python3", "-m", "scanner.precheck_worker"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  precheck-worker-2:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    entrypoint: ["python3", "-m", "scanner.precheck_worker"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  report-worker:
    image: ghcr.io/dc-77/vectiscan/report-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vectiscan-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vectiscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vectiscan-internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vectiscan-redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - vectiscan-minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal
