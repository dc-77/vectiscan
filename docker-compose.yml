networks:
  proxy-net:
    external: true
  vectiscan-internal:
    driver: bridge

volumes:
  vectiscan-pg-data:
  vectiscan-redis-data:
  vectiscan-minio-data:

services:
  frontend:
    image: ghcr.io/dc-77/vectiscan/frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://scan-api.vectigal.tech
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-web.rule=Host(`scan.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-web.middlewares=security-headers@file,rate-limit@file,internal-only@file"
      - "traefik.http.services.vectiscan-web.loadbalancer.server.port=3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  api:
    image: ghcr.io/dc-77/vectiscan/api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@vectigal.tech}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-api.rule=Host(`scan-api.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-api.middlewares=security-headers@file,rate-limit@file,internal-only@file"
      - "traefik.http.services.vectiscan-api.loadbalancer.server.port=4000"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.interval=15s"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  # Worker 1 + dedicated ZAP (no shared ZAP — prevents cross-contamination)
  scan-worker-1:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-1:8090
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-1:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-1:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Worker 2 + dedicated ZAP
  scan-worker-2:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-2:8090
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-2:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-2:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  report-worker:
    image: ghcr.io/dc-77/vectiscan/report-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vectiscan-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vectiscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vectiscan-internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vectiscan-redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - vectiscan-minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal
