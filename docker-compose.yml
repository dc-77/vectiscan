networks:
  proxy-net:
    external: true
  vectiscan-internal:
    driver: bridge
  twenty-internal:
    driver: bridge
  # Keycloak-SSO (VEC-437/VEC-421): eigenes internes Netz, isoliert von der
  # App-DB. keycloak haengt zusaetzlich am proxy-net (Traefik-Route).
  keycloak-internal:
    driver: bridge

volumes:
  vectiscan-pg-data:
  vectiscan-redis-data:
  vectiscan-minio-data:
  # Monitoring-Stack (VEC-85, A5): self-hosted, spend-frei
  vectiscan-kuma-data:
  vectiscan-loki-data:
  vectiscan-grafana-data:
  # Twenty CRM (VEC-304)
  twenty-pg-data:
  twenty-server-data:
  # Keycloak-SSO (VEC-437) — dedizierte Instanz, eigene DB
  keycloak-pg-data:

services:
  frontend:
    image: ghcr.io/dc-77/vectiscan/frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://scan-api.vectigal.tech
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    labels:
      - "traefik.enable=true"
      # VEC-34: Public-Router — Kunden erreichen das Frontend von außen per HTTPS.
      # `internal-only@file` hier bewusst abgelöst; Let's-Encrypt-Cert via Host-CertResolver.
      # VEC-160/VEC-269: vectiscan.de + www als Alias (Phase 1) — selbes Frontend, kein Rebuild (CORS origin:true).
      #          Hosts müssen öffentlich auf 62.217.52.165 (docker02-Public-IP) zeigen, sonst kein LE HTTP-01.
      - "traefik.http.routers.vectiscan-web.rule=Host(`scan.vectigal.tech`) || Host(`vectiscan.de`) || Host(`www.vectiscan.de`)"
      - "traefik.http.routers.vectiscan-web.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-web.tls=true"
      # VEC-269 ROOT-CAUSE: `letsencrypt`-Resolver nutzt DNS-01 via uniteddomains-Provider mit kaputtem
      #          API-Key ("Invalid API key format") → Issuance für vectiscan.de/www schlug fehl (Default-Cert).
      #          `letsencrypt-http` = HTTP-01 (entryPoint web) funktioniert. Behebt zugleich latenten
      #          Renewal-Fehler für scan.vectigal.tech (Cert läuft Aug ab, DNS-Resolver wäre dann gescheitert).
      - "traefik.http.routers.vectiscan-web.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-web.middlewares=security-headers@file,rate-limit@file"
      # VEC-34 AC2 / VEC-143: Admin-Flächen (/admin/**) sind am Edge auth-gegated (Basic-Auth).
      # IP-Allowlist (internal-only) ist auf diesem Host wirkungslos (Docker-SNAT, daemon iptables:false → alle IPs = 172.18.0.1).
      # Spezifischere Regel + höhere Priorität → externer /admin-Request ohne Credentials → 401.
      # VEC-167: `PathRegexp((?i)…)` statt `PathPrefix` — Matcher case-INSENSITIV, sonst umgeht /ADMIN das Edge-Gate (404 statt 401).
      # VEC-160/VEC-269 SICHERHEITSKRITISCH: Admin-Guard muss für ALLE Frontend-Hosts greifen (auch vectiscan.de + www),
      #          sonst wäre /admin über die neuen Hosts ungeschützt. Host-Gruppe geklammert vor PathRegexp.
      - "traefik.http.routers.vectiscan-web-admin.rule=(Host(`scan.vectigal.tech`) || Host(`vectiscan.de`) || Host(`www.vectiscan.de`)) && PathRegexp(`(?i)^/admin`)"
      - "traefik.http.routers.vectiscan-web-admin.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-web-admin.tls=true"
      # VEC-269: gleicher HTTP-01-Resolver wie vectiscan-web (DNS-01/uniteddomains-Key kaputt).
      - "traefik.http.routers.vectiscan-web-admin.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-web-admin.priority=100"
      - "traefik.http.routers.vectiscan-web-admin.middlewares=security-headers@file,internal-auth@file"
      - "traefik.http.routers.vectiscan-web-admin.service=vectiscan-web"
      - "traefik.http.services.vectiscan-web.loadbalancer.server.port=3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  api:
    image: ghcr.io/dc-77/vectiscan/api:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-VectiScan <noreply@vectiscan.de>}
      # WebCheck-Free CAPTCHA (VEC-173): unset => Prüfung deaktiviert; in Prod setzen.
      WEBCHECK_TURNSTILE_SECRET: ${WEBCHECK_TURNSTILE_SECRET:-}
      # VEC-36: Routing-Ziel fuer Demo-/Lead-Anfragen explizit in den Container
      # reichen. Ohne diesen Passthrough erreichte SALES_LEAD_EMAIL nie den
      # Runtime-Container -> Code-Default 'kontakt@vectigal.gmbh' (UNbetreutes
      # Postfach) griff, Resend meldete routed:true, aber kein Lead kam beim
      # Vertrieb an. Nicht geheim -> committeter, per CI-Var ueberschreibbarer
      # Default auf die betreuten Marken-Postfaecher. Komma-separiert = mehrere
      # Empfaenger.
      SALES_LEAD_EMAIL: ${SALES_LEAD_EMAIL:-support@vectiscan.de,kontakt@vectigal.ai}
      # VEC-247: Stripe-Konfig in den API-Container reichen. Ohne diese
      # Passthroughs erreichte bisher KEINE Stripe-Variable den Container —
      # /api/subscriptions antwortete daher strukturell mit 503
      # (payment_not_configured / price_not_configured), Root-Cause des
      # nicht funktionierenden Perimeter-Kaufs (VEC-223). Secret-Werte
      # (Key/Webhook) bleiben leer bis als CI-Var gebunden; die price_id ist
      # nicht geheim (Stripe gibt sie ohnehin client-seitig im Checkout aus).
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PERIMETER: ${STRIPE_PRICE_PERIMETER:-}
      STRIPE_PRICE_DEFAULT: ${STRIPE_PRICE_DEFAULT:-}
      # VEC-436: one-time Price-ID fuer den Einzelscan-Kauf (mode=payment).
      STRIPE_PRICE_PERIMETER_ONETIME: ${STRIPE_PRICE_PERIMETER_ONETIME:-}
      # VEC-301: CRM-Upsert-Vars (Twenty REST). Leer → crm.ts bleibt im Trockenmodus (No-op).
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL:-}
      CRM_API_KEY: ${CRM_API_KEY:-}
      SALES_NOTIFY_URL: ${SALES_NOTIFY_URL:-}
      # VEC-363: Live-Check (SofortScan) — Adresse des internen webcheck-core
      # (nur vectiscan-internal erreichbar). Default zeigt auf den Service-Namen.
      WEBCHECK_CORE_URL: ${WEBCHECK_CORE_URL:-http://webcheck-core:3000}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # VEC-34: Public-Router — Kunden erreichen die API von außen per HTTPS.
      # `internal-only@file` hier bewusst abgelöst; Let's-Encrypt-Cert via Host-CertResolver.
      # VEC-347: `letsencrypt-http` = HTTP-01 (entryPoint web). `letsencrypt`-DNS-01-Resolver ist kaputt
      #          (uniteddomains-API-Key ungültig, Root-Cause VEC-269). Cert läuft Aug 2026 ab; Renewal
      #          über DNS-01 würde fehlschlagen → Default-Self-Signed. HTTP-01 löst das dauerhaft.
      - "traefik.http.routers.vectiscan-api.rule=Host(`scan-api.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-api.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-api.tls=true"
      - "traefik.http.routers.vectiscan-api.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-api.middlewares=security-headers@file,rate-limit@file"
      # VEC-370: Admin-API (/api/admin/**) — basicAuth (internal-auth@file) entfernt.
      # Auth erfolgt ausschließlich durch App-seitiges JWT requireAdmin (Rolle admin).
      # basicAuth war funktionsbrechend für SPA-XHRs (Browser sendet kein Basic bei fetch()).
      # VEC-167: `PathRegexp((?i)…)` statt `PathPrefix` — case-INSENSITIV.
      - "traefik.http.routers.vectiscan-api-admin.rule=Host(`scan-api.vectigal.tech`) && PathRegexp(`(?i)^/api/admin`)"
      - "traefik.http.routers.vectiscan-api-admin.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-api-admin.tls=true"
      # VEC-347: gleicher HTTP-01-Resolver wie vectiscan-api (DNS-01/uniteddomains-Key kaputt, s. VEC-269).
      - "traefik.http.routers.vectiscan-api-admin.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-api-admin.priority=100"
      - "traefik.http.routers.vectiscan-api-admin.middlewares=security-headers@file"
      - "traefik.http.routers.vectiscan-api-admin.service=vectiscan-api"
      # VEC-358: OPTIONS-Preflight-Router bleibt harmlos (höhere Prio 110, matcht nur OPTIONS).
      # Mit removal von basicAuth ist er nicht mehr zwingend nötig, aber schadet nicht.
      - "traefik.http.routers.vectiscan-api-admin-preflight.rule=Host(`scan-api.vectigal.tech`) && PathRegexp(`(?i)^/api/admin`) && Method(`OPTIONS`)"
      - "traefik.http.routers.vectiscan-api-admin-preflight.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-api-admin-preflight.tls=true"
      - "traefik.http.routers.vectiscan-api-admin-preflight.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-api-admin-preflight.priority=110"
      - "traefik.http.routers.vectiscan-api-admin-preflight.middlewares=security-headers@file"
      - "traefik.http.routers.vectiscan-api-admin-preflight.service=vectiscan-api"
      - "traefik.http.services.vectiscan-api.loadbalancer.server.port=4000"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.vectiscan-api.loadbalancer.healthcheck.interval=15s"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - proxy-net
      - vectiscan-internal

  # ─────────────────────────────────────────────────────────
  # webcheck-core — interner Live-Check-Kern (VEC-363 / VEC-360 §5 Option A).
  # Upstream: Lissy93/web-check (MIT, s. NOTICE). NUR der technische Kern;
  # die Astro-UI ist via DISABLE_GUI deaktiviert. KEINE Traefik-Exposure,
  # KEIN proxy-net — ausschließlich über die /api/live-check/*-Fassade der
  # API erreichbar. Keys/Tokens als ENV (leer = Modul degradiert sauber).
  webcheck-core:
    image: lissy93/web-check:2.1.9@sha256:fa26f4dc781a187fb3f9e4958c7faee29af628e2fc78a335930e0c3ad28d5acd
    restart: unless-stopped
    environment:
      PORT: "3000"
      # Kein eingebautes GUI/Astro — wir nutzen nur die /api/<modul>-Endpunkte.
      DISABLE_GUI: "true"
      # Optionale Drittanbieter-Keys (Spike VEC-362: überwiegend key-frei).
      # Leer lassen → die betroffenen Module liefern degradierte Ergebnisse,
      # statt zu crashen. In Prod via CI-Var binden, falls vorhanden.
      SHODAN_API_KEY: ${WEBCHECK_SHODAN_API_KEY:-}
      GOOGLE_CLOUD_API_KEY: ${WEBCHECK_GOOGLE_CLOUD_API_KEY:-}
      CLOUDMERSIVE_API_KEY: ${WEBCHECK_CLOUDMERSIVE_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "1"
          # Chromium (Screenshot) ist die schwerste Abhängigkeit (Spike VEC-362).
          memory: 1G
    networks:
      - vectiscan-internal

  # Worker 1 — legacy ZAP_BASE_URL fallback; pool mode activated via
  # ZAP_POOL_ENABLED=true once all four daemons are healthy (see §11.3).
  # ─────────────────────────────────────────────────────────
  # vpn-gw — adaptiver VPN-Proxy (PR-VPN, 2026-05-03)
  # AUSKOMMENTIERT: deploy-auto kopiert nur docker-compose.yml ins
  # DEPLOY_PATH, nicht vpn-gw/. Aktivierung erfordert:
  #   1. CI-Build-Job fuer vpn-gw → ghcr.io-Push
  #   2. Hier `image: ghcr.io/dc-77/vectiscan/vpn-gw:latest` einfuegen
  #   3. EXPRESSVPN-DEB im Repo
  # Bis dahin: scan-worker laeuft ohne vpn-gw → VpnSwitch.is_available()=False
  # → Tools laufen direkt (Default-Verhalten vor PR-VPN), kein Funktionsverlust.
  # ─────────────────────────────────────────────────────────
  # vpn-gw:
  #   build: ./vpn-gw
  #   restart: unless-stopped
  #   environment:
  #     EXPRESSVPN_ACCESS_TOKEN: ${EXPRESSVPN_ACCESS_TOKEN:-}
  #   cap_add:
  #     - NET_ADMIN
  #   devices:
  #     - /dev/net/tun
  #   sysctls:
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   networks:
  #     - vectiscan-internal
  #   healthcheck:
  #     test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3

  scan-worker-1:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-1:8090
      WORKER_ID: scan-worker-1
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-1:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-1:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Worker 2 — see scan-worker-1 comment.
  scan-worker-2:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-2:8090
      WORKER_ID: scan-worker-2
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-2:
        condition: service_healthy
    networks:
      - vectiscan-internal

  # Worker 3 — pool-only (no dedicated legacy ZAP). Depends on zap-3 for
  # readiness gating but uses the shared pool once ZAP_POOL_ENABLED=true.
  scan-worker-3:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      WPSCAN_API_TOKEN: ${WPSCAN_API_TOKEN:-}
      ZAP_BASE_URL: http://zap-3:8090
      WORKER_ID: scan-worker-3
      ZAP_POOL: ${ZAP_POOL:-zap-1,zap-2,zap-3,zap-4}
      ZAP_POOL_ENABLED: ${ZAP_POOL_ENABLED:-false}
      ZAP_MAX_PARALLEL_PER_ORDER: ${ZAP_MAX_PARALLEL_PER_ORDER:-3}
      PHASE1_MAX_WORKERS: ${PHASE1_MAX_WORKERS:-3}
      PHASE2_STAGE2_WAF_SAFE: ${PHASE2_STAGE2_WAF_SAFE:-true}
      # PR-VPN (2026-05-03): adaptive VPN-Activation bei WAF-Block
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_GATEWAY_URL: ${VPN_GATEWAY_URL:-http://vpn-gw:8080}
      VPN_PROXY_URL: ${VPN_PROXY_URL:-http://vpn-gw:3128}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      zap-3:
        condition: service_healthy
    networks:
      - vectiscan-internal

  zap-2:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Pool-Expansion: zap-3 + zap-4 treten dem ZAP-Pool bei. Erst nach
  # ZAP_POOL_ENABLED=true auf den Workern werden sie genutzt.
  zap-3:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  zap-4:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -port 8090
      -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.maxScanDurationInMins=12
      -config ajaxSpider.maxDuration=4
      -config connection.timeoutInSecs=20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vectiscan-internal

  # Precheck-Worker: validiert Multi-Target-Eingaben vor Admin-Review.
  # Nutzt scan-worker-Image mit alternativem Entrypoint. Keine ZAP-Dependency.
  precheck-worker-1:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    entrypoint: ["python3", "-m", "scanner.precheck_worker"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  precheck-worker-2:
    image: ghcr.io/dc-77/vectiscan/scan-worker:${TAG:-latest}
    restart: unless-stopped
    entrypoint: ["python3", "-m", "scanner.precheck_worker"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  report-worker:
    image: ghcr.io/dc-77/vectiscan/report-worker:${TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # M2-Ende (2026-06-01): Validation-Gate STRICT. Defekte blockieren PDF-Build,
      # Order geht auf failed mit Begruendung in error_message. Per ENV-Override
      # auf "warn" oder "off" zurueckfallbar bei Prod-Incidents (siehe
      # report-worker/reporter/validation/gate.py:ValidationLevel).
      # POLICY_VERSION-Default kommt aus severity_policy.py:30 (2026-06-01.1) —
      # bei Bedarf hier per VECTISCAN_POLICY_VERSION ENV-Var ueberschreiben.
      # M6.7 (2026-05-14): zurueck auf STRICT — der Pilot mit den 2 alten
      # Orders ist abgeschlossen, alle bekannten Mapper-Bugs (M6.18 URLhaus-
      # Fehlklassifikation) sind gefixt. Defekte blockieren ab jetzt wieder
      # den PDF-Build (Order -> failed), damit ein neuer Frischscan auf
      # heuel.com sauber durchgeht.
      VECTISCAN_VALIDATION_LEVEL: ${VECTISCAN_VALIDATION_LEVEL:-strict}
      # M6 Cutover-Flag (Doc 02 Master-Plan):
      #   - "v2" (Default seit 2026-05-13): 3-Schichten-Architektur aktiv
      #     (Frontpage / Strategie / Befund-Details + Anhaenge A-F).
      #     Big-Bang-Flip da noch keine echten Customer betroffen.
      #   - "v1": Legacy-Renderer (bleibt im Code als Fallback bis nach
      #     mehrwoechiger Pilot-Phase, dann separate Removal-PR).
      #   Override per .env wenn ein Pilot-Reset noetig ist.
      VECTISCAN_REPORT_LAYOUT: ${VECTISCAN_REPORT_LAYOUT:-v2}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vectiscan-internal

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - vectiscan-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vectiscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vectiscan-internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vectiscan-redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - vectiscan-minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal

  # ===========================================================================
  # MONITORING-STACK (VEC-85, A5 — self-hosted, spend-frei)
  # ---------------------------------------------------------------------------
  # uptime-kuma : aktives Health-Probing der Services + Alerting (Resend-SMTP)
  # loki        : zentrale Log-Aggregation (Filesystem-Storage, 14d Retention)
  # promtail    : tailt alle Container-Logs via Docker-API → Loki
  # grafana     : Log-Viewer (Loki-Datasource, vorprovisioniert)
  # Configs unter ./monitoring/ (von deploy-auto neben compose ausgerollt).
  # Bewusst OHNE healthcheck-Block: der Deploy-Gate wertet Container ohne
  # Health-Feld als gesund → ein langsamer Monitoring-Start blockt kein Deploy.
  # ===========================================================================
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - vectiscan-kuma-data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-status.rule=Host(`status.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-status.middlewares=security-headers@file,internal-auth@file"
      - "traefik.http.services.vectiscan-status.loadbalancer.server.port=3001"
    networks:
      - proxy-net
      - vectiscan-internal

  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - vectiscan-loki-data:/loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - vectiscan-internal

  promtail:
    image: grafana/promtail:2.9.8
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    depends_on:
      - loki
    networks:
      - vectiscan-internal

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-vectiscan-admin}
      GF_SERVER_ROOT_URL: https://logs.vectigal.tech
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # VEC-229: SMTP fuer Grafana-Alerting → Resend-SMTP (gleicher Kanal wie
      # Uptime-Kuma, siehe MONITORING.md). Reused vorhandene Resend-Creds; der
      # Schluessel landet via .env aus der CI auf dem Host (NIE im Image/Repo).
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.resend.com:587
      GF_SMTP_USER: resend
      GF_SMTP_PASSWORD: ${RESEND_API_KEY:-}
      # VEC-268: GF_SMTP_FROM_ADDRESS muss eine REINE E-Mail sein (Display-Name
      # gehoert in GF_SMTP_FROM_NAME). Nicht aus RESEND_FROM_EMAIL ableiten — das
      # traegt seit dem Cutover die Form "VectiScan <noreply@vectiscan.de>", die
      # Grafana beim SMTP-Config-Parse abweist (Container-Restart-Loop). Eigene,
      # entkoppelte Variable mit reiner Cutover-Adresse als Default.
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS:-noreply@vectiscan.de}
      GF_SMTP_FROM_NAME: VectiScan Alerting
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
      # Zieladresse fuer Alert-Mails (Ops-Postfach) → vom Alerting-Contactpoint
      # via $__env{ALERT_EMAIL_TO} referenziert.
      ALERT_EMAIL_TO: ${ADMIN_EMAIL:-}
    volumes:
      - vectiscan-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vectiscan-logs.rule=Host(`logs.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-logs.middlewares=security-headers@file,internal-auth@file"
      - "traefik.http.services.vectiscan-logs.loadbalancer.server.port=3000"
    depends_on:
      - loki
    networks:
      - proxy-net
      - vectiscan-internal


  # ── Twenty CRM (VEC-304 / VEC-301) ─────────────────────────────────────────────
  # WICHTIG: Alle Twenty-Services hängen am Compose-Profil `crm` und werden vom
  # Standard-Deploy (`docker compose up -d` ohne Profil) übersprungen. Grund:
  # TWENTY_PG_PASSWORD/TWENTY_APP_SECRET sind auf dem Prod-Runner (noch) nicht
  # gesetzt; ohne Gate brach `docker compose` schon beim Interpolieren ab und
  # blockierte JEDEN main-Deploy (Pipeline 2624 deploy-auto failed). Zum
  # Aktivieren der CRM: Secrets als CI-Variablen setzen + COMPOSE_PROFILES=crm
  # bzw. `--profile crm` im Deploy ergänzen (Owner: VEC-304-Folge-Issue).
  twenty-db:
    image: postgres:16
    profiles: ["crm"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: ${TWENTY_PG_PASSWORD:-}
      POSTGRES_DB: twenty
    volumes:
      - twenty-pg-data:/var/lib/postgresql/data
    networks:
      - twenty-internal

  twenty-redis:
    image: redis:7
    profiles: ["crm"]
    restart: unless-stopped
    networks:
      - twenty-internal

  twenty-server:
    image: twentycrm/twenty:v2.9.0
    profiles: ["crm"]
    restart: unless-stopped
    environment:
      SERVER_URL: https://crm.vectigal.tech
      PG_DATABASE_URL: postgres://twenty:${TWENTY_PG_PASSWORD:-}@twenty-db:5432/twenty
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-}
      STORAGE_TYPE: local
      DISABLE_DB_MIGRATIONS: "false"
      # VEC-326: E-Mail-Versand für Workspace-Einladungen via Resend SMTP
      EMAIL_DRIVER: smtp
      EMAIL_FROM_ADDRESS: ${RESEND_FROM_EMAIL:-noreply@vectiscan.de}
      EMAIL_FROM_NAME: VectiScan CRM
      EMAIL_SYSTEM_ADDRESS: ${RESEND_FROM_EMAIL:-noreply@vectiscan.de}
      EMAIL_SMTP_HOST: smtp.resend.com
      EMAIL_SMTP_PORT: "587"
      EMAIL_SMTP_USER: resend
      EMAIL_SMTP_PASSWORD: ${RESEND_API_KEY:-}
    depends_on:
      - twenty-db
      - twenty-redis
    volumes:
      - twenty-server-data:/app/packages/twenty-server/.local-storage
    networks:
      - twenty-internal
      - proxy-net
    labels:
      - "traefik.enable=true"
      # CRM-UI: KEIN internal-auth (Edge-Basic-Auth) — Twenty ist eine SPA, deren
      # XHR/GraphQL/WebSocket-Requests mit einem Basic-Auth-Gate inkompatibel sind
      # (zweites, nicht erfüllbares Auth-Popup). Schutz übernimmt Twentys eigener
      # vollwertiger Workspace-Login. security-headers bleibt.
      - "traefik.http.routers.twenty.rule=Host(`crm.vectigal.tech`)"
      - "traefik.http.routers.twenty.entrypoints=websecure"
      - "traefik.http.routers.twenty.tls=true"
      - "traefik.http.routers.twenty.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.twenty.middlewares=security-headers@file"
      - "traefik.http.routers.twenty.service=twenty"
      - "traefik.http.services.twenty.loadbalancer.server.port=3000"
      # REST/API-Router ohne Basic-Auth (Bearer CRM_API_KEY via Lead-Router ausreichend)
      - "traefik.http.routers.twenty-api.rule=Host(`crm.vectigal.tech`) && PathPrefix(`/api`,`/auth`,`/rest`)"
      - "traefik.http.routers.twenty-api.entrypoints=websecure"
      - "traefik.http.routers.twenty-api.tls=true"
      - "traefik.http.routers.twenty-api.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.twenty-api.middlewares=security-headers@file,rate-limit@file"
      - "traefik.http.routers.twenty-api.service=twenty-api"
      - "traefik.http.services.twenty-api.loadbalancer.server.port=3000"

  twenty-worker:
    image: twentycrm/twenty:v2.9.0
    profiles: ["crm"]
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://twenty:${TWENTY_PG_PASSWORD:-}@twenty-db:5432/twenty
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-}
      SERVER_URL: https://crm.vectigal.tech
      STORAGE_TYPE: local
    depends_on:
      - twenty-server
    networks:
      - twenty-internal

  # ── Keycloak-SSO (VEC-437 / C1, Parent VEC-421) ────────────────────────────
  # Dedizierte VectiScan-Keycloak (Board-Entscheid: kein Reuse). Spike VEC-430
  # (docs/AUTH-SSO-VEC-430-SPIKE.md), Runbook docs/AUTH-SSO-C1-KEYCLOAK.md.
  #
  # WICHTIG — Profil-Gate `sso` (Lehre aus VEC-304/Twenty): keycloak + keycloak-db
  # haengen am Compose-Profil `sso` und werden vom Standard-Deploy (COMPOSE_PROFILES=crm)
  # UEBERSPRUNGEN. Aktivierung ausschliesslich ueber den gegateten Ops-Job
  # `ops-keycloak-provision` (rendert Realm-Secrets + startet das sso-Profil).
  # Alle KC-Secrets als ${VAR:-} mit Soft-Default -> ein fehlendes Secret bricht
  # `docker compose` NICHT (kein ${VAR:?}, das wuerde wie bei VEC-304 jeden
  # main-Deploy blockieren). Blast-Radius beim Default-Deploy: null.
  #
  # Non-Root: das offizielle Keycloak-Image laeuft als UID 1000 (kein root) —
  # gleiche Konvention wie die uebrigen Stock-Infra-Images (postgres/twenty/grafana),
  # daher KEIN eigenes Multi-Stage-Dockerfile (nur unsere 4 App-Services bauen wir).
  # NAT/iptables/ens192-MASQUERADE des Scan-Workers: NICHT beruehrt.
  keycloak-db:
    image: postgres:16
    profiles: ["sso"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keycloak-internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    profiles: ["sso"]
    restart: unless-stopped
    # start (Prod-Modus) + Realm-Import beim ersten Start. --optimized=false laesst
    # den Build (db=postgres) zur Laufzeit laufen — fuer eine interne IdP-Instanz
    # akzeptabel (kein eigenes Build-Stage noetig, s. Kommentar oben).
    command: ["start", "--optimized=false", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-}
      # Oeffentlicher Issuer-Host — vom Browser (Redirect) UND von docker02
      # (Token/JWKS) per HTTPS erreichbar. *.vectigal.tech zeigt bereits auf den
      # Server (CLAUDE.md), daher kein neuer DNS-Eintrag noetig.
      KC_HOSTNAME: https://id.vectigal.tech
      # Traefik terminiert TLS und spricht den Container per HTTP an.
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      # Master-Admin-Bootstrap (nur beim allerersten Start wirksam). KC 26+ Var-Namen.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      # Realm-Import: der CI-Job ops-keycloak-provision rendert die Secrets und
      # legt die fertige Datei nach ${DEPLOY_PATH}/keycloak/import/ (read-only Mount).
      - ./keycloak/import:/opt/keycloak/data/import:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    depends_on:
      keycloak-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # SSO-Login-Seite ist bewusst OHNE internal-auth (eine IdP-Login-Seite muss
      # erreichbar sein; rate-limit schuetzt). LE-Cert via HTTP-01-Resolver wie ueberall.
      - "traefik.http.routers.vectiscan-keycloak.rule=Host(`id.vectigal.tech`)"
      - "traefik.http.routers.vectiscan-keycloak.entrypoints=websecure"
      - "traefik.http.routers.vectiscan-keycloak.tls=true"
      - "traefik.http.routers.vectiscan-keycloak.tls.certresolver=letsencrypt-http"
      - "traefik.http.routers.vectiscan-keycloak.middlewares=security-headers@file,rate-limit@file"
      - "traefik.http.routers.vectiscan-keycloak.service=vectiscan-keycloak"
      - "traefik.http.services.vectiscan-keycloak.loadbalancer.server.port=8080"
    networks:
      - proxy-net
      - keycloak-internal