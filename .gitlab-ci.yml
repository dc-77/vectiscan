# =============================================================================
# VectiScan CI/CD Pipeline
# =============================================================================
# Multi-image build pipeline for the VectiScan security scanning platform.
# Builds four services, scans with Trivy, runs tests, and deploys via
# docker compose on vectigal-docker02.
# =============================================================================

variables:
  REGISTRY: ghcr.io
  BASE_IMAGE: ${REGISTRY}/dc-77/vectiscan
  APP_NAME: vectiscan
  DEPLOY_PATH: /opt/apps/${APP_NAME}

stages:
  - build
  - scan
  - test
  - deploy
  - ops

# =============================================================================
# BUILD STAGE — Build & push Docker images for all four services
# =============================================================================

.build-base:
  stage: build
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    - docker build --no-cache -t ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA} -t ${BASE_IMAGE}/${SERVICE}:latest ${SERVICE}/
    - docker push ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BASE_IMAGE}/${SERVICE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

build-frontend:
  extends: .build-base
  variables:
    SERVICE: frontend

build-api:
  extends: .build-base
  variables:
    SERVICE: api

build-scan-worker:
  extends: .build-base
  variables:
    SERVICE: scan-worker

build-report-worker:
  extends: .build-base
  variables:
    SERVICE: report-worker

# =============================================================================
# SCAN STAGE — Trivy vulnerability scan for each image (CRITICAL only)
# =============================================================================

.trivy-base:
  stage: scan
  tags: [vectigal]
  script:
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

trivy-frontend:
  extends: .trivy-base
  variables:
    SERVICE: frontend

trivy-api:
  extends: .trivy-base
  variables:
    SERVICE: api

trivy-scan-worker:
  extends: .trivy-base
  variables:
    SERVICE: scan-worker
  rules:
    - when: never

trivy-report-worker:
  extends: .trivy-base
  variables:
    SERVICE: report-worker

# =============================================================================
# TEST STAGE — Unit tests for API and both workers
# =============================================================================

test-api:
  stage: test
  tags: [vectigal]
  image: node:20-alpine
  script:
    - cd api && npm ci && npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-scan-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd scan-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt -r requirements-dev.txt && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-report-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd report-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt pytest && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# DEPLOY STAGE — Rolling deploy, manual deploy, and rollback
# =============================================================================

.deploy-base:
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    - cd ${DEPLOY_PATH}
    # ── Pre-Deploy: aktive Scans verhindern damit der Container-Restart
    #    keinen Mid-Phase2-Scan abwuergt (Daten waeren verloren, weil noch
    #    nicht in MinIO hochgeladen). Bei DEPLOY_FORCE=true wird die Pruefung
    #    uebersprungen — fuer Notfall-Hotfixes.
    - |
      if [ "${DEPLOY_FORCE:-false}" != "true" ]; then
        ACTIVE=$(docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -tAc "
          SELECT count(*) FROM orders WHERE status IN
            ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')
        " 2>/dev/null | tr -d '[:space:]' || echo "?")
        if [ "$ACTIVE" = "?" ]; then
          echo "WARN: Konnte aktive Scans nicht pruefen (DB nicht erreichbar?). Fahre vorsichtig fort."
        elif [ "$ACTIVE" -gt 0 ]; then
          echo "ERROR: $ACTIVE aktive Scan(s) laufen — Deploy abgebrochen."
          echo "       Warte bis sie fertig sind, oder setze DEPLOY_FORCE=true (Daten gehen verloren!)."
          docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -c "
            SELECT id, target_url, status, scan_started_at FROM orders WHERE status IN
              ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')
            ORDER BY scan_started_at DESC LIMIT 10
          " 2>/dev/null || true
          exit 1
        else
          echo "OK: keine aktiven Scans, Deploy darf weiterlaufen."
        fi
      else
        echo "WARN: DEPLOY_FORCE=true — aktive Scans werden ignoriert."
      fi
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp .env .env.bak 2>/dev/null || true
    - |
      cat > .env <<ENVEOF
      DB_NAME=${DB_NAME}
      DB_USER=${DB_USER}
      DB_PASSWORD=${DB_PASSWORD}
      MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      JWT_SECRET=${JWT_SECRET}
      ADMIN_EMAIL=${ADMIN_EMAIL}
      ADMIN_PASSWORD=${ADMIN_PASSWORD}
      ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      RESEND_API_KEY=${RESEND_API_KEY}
      RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      ENVEOF
    - sed -i 's/^[[:space:]]*//' .env
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    - docker compose pull
    - TAG=${TAG} docker compose up -d --remove-orphans
    # Give all 7 containers time to pass health checks
    - sleep 30
    - docker compose ps
    - docker compose ps --format json | python3 -c "import sys,json; containers=[json.loads(line) for line in sys.stdin if line.strip()]; unhealthy=[c['Name'] for c in containers if c.get('Health','') not in ('','healthy') or c.get('State')!='running']; print('Unhealthy:',unhealthy) if unhealthy else print('All healthy'); exit(1 if unhealthy else 0)"
  after_script:
    - docker image prune -a -f --filter "until=1h"
    - docker builder prune -a -f
  environment:
    name: production
    url: https://scan.vectigal.tech

deploy-auto:
  extends: .deploy-base
  stage: deploy
  variables:
    TAG: latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-manual:
  extends: .deploy-base
  stage: deploy
  variables:
    TAG: ${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# =============================================================================
# OPS STAGE — manuelle Operations-Jobs
# =============================================================================
# Liegt nach `deploy` in einer eigenen Stage, damit die Pipeline regulaer als
# "passed" durchlaeuft (kein "blocked"-Status durch wartende manuelle Jobs).
# Alle Jobs hier sind `when: manual` + `allow_failure: true` — werden nie
# automatisch ausgefuehrt und blockieren den Pipeline-Status nicht.
# =============================================================================

.ops-base:
  stage: ops
  tags: [vectigal]
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Restart-Worker — gezieltes Restart einzelner Worker-Container ohne
# einen vollen Cleanup. Nutzt Pipeline-Variable `WORKER` (Default report-worker).
# =============================================================================
ops-restart-worker:
  extends: .ops-base
  variables:
    WORKER: report-worker
  script:
    - cd ${DEPLOY_PATH}
    - echo "Restarting ${WORKER}..."
    - docker compose restart ${WORKER}
    - sleep 5
    - docker compose ps ${WORKER}
    - echo
    - echo "=== Letzte 30 Log-Zeilen nach Restart ==="
    - docker compose logs --tail=30 --no-color ${WORKER} 2>&1 | tail -30 || true

# =============================================================================
# Services-Status — Container-Status + BullMQ-Queue-Tiefen + Worker-Logs.
# Nur Lesezugriff, kein restart. Ideal um zu sehen warum ein Job haengt.
# =============================================================================
ops-services-status:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== docker compose ps ==="
    - docker compose ps --format 'table {{.Name}}\t{{.State}}\t{{.Status}}' || true
    - echo
    - echo "=== Redis BullMQ Queue-Tiefen ==="
    - |
      docker compose exec -T redis sh -c '
        for q in precheck-pending scan-pending report-pending; do
          len=$(redis-cli LLEN "$q" 2>/dev/null || echo "?")
          printf "  %-22s %s\n" "$q" "$len"
        done
        echo
        echo "  bull-namespaced (waiting/active/completed/failed):"
        for prefix in bull:scan-pending bull:report-pending bull:precheck-pending; do
          for s in waiting active completed failed delayed; do
            len=$(redis-cli LLEN "${prefix}:${s}" 2>/dev/null || echo "0")
            [ "$len" != "0" ] && [ "$len" != "?" ] && printf "    %-40s %s\n" "${prefix}:${s}" "$len"
          done
        done
      '
    - echo
    - echo "=== report-worker Logs (letzte 100 Zeilen) ==="
    - docker compose logs --tail=100 --no-color report-worker 2>&1 | tail -100 || true
    - echo
    - echo "=== scan-worker-1 Logs (letzte 30 Zeilen) ==="
    - docker compose logs --tail=30 --no-color scan-worker-1 2>&1 | tail -30 || true

# =============================================================================
# Findings-Audit (Read-Only) — Bewertung der Determinismus-Pipeline
# =============================================================================
# Liefert eine Übersicht ueber Reports + Findings: severity-Verteilung,
# policy_id-Coverage, SP-FALLBACK-Rate, ai_cache-Hit-Statistik, etc.
# Komplett read-only — kein DDL, keine Mutation. Logs ueber GitLab-API
# auswertbar.
ops-findings-audit:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - |
      docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -A -X <<'SQL'
      \echo === ORDERS ===
      SELECT status, count(*) FROM orders GROUP BY status ORDER BY 1;

      \echo === REPORTS (count + policy_version) ===
      SELECT policy_version, count(*) AS reports
        FROM reports GROUP BY policy_version ORDER BY 1 NULLS LAST;

      \echo === SEVERITY VERTEILUNG (alle Reports) ===
      SELECT
        SUM((severity_counts->>'critical')::int) AS critical,
        SUM((severity_counts->>'high')::int)     AS high,
        SUM((severity_counts->>'medium')::int)   AS medium,
        SUM((severity_counts->>'low')::int)      AS low,
        SUM((severity_counts->>'info')::int)     AS info,
        count(*)                                  AS reports
      FROM reports
      WHERE severity_counts IS NOT NULL;

      \echo === SEVERITY PRO REPORT ===
      SELECT
        r.id AS report_id,
        o.target_url,
        o.package,
        r.created_at::date AS day,
        r.policy_version,
        r.severity_counts->>'critical' AS critical,
        r.severity_counts->>'high'     AS high,
        r.severity_counts->>'medium'   AS medium,
        r.severity_counts->>'low'      AS low,
        r.severity_counts->>'info'     AS info,
        coalesce(array_length(r.policy_id_distinct,1),0) AS distinct_policies,
        coalesce(jsonb_array_length(r.findings_data),0) AS findings_count
      FROM reports r
      LEFT JOIN orders o ON o.id = r.order_id
      ORDER BY r.created_at DESC
      LIMIT 20;

      \echo === SP-FALLBACK RATE ===
      SELECT
        count(*) AS total_reports,
        count(*) FILTER (WHERE 'SP-FALLBACK' = ANY(policy_id_distinct)) AS reports_with_fallback,
        ROUND(100.0 * count(*) FILTER (WHERE 'SP-FALLBACK' = ANY(policy_id_distinct))
              / NULLIF(count(*),0), 1) AS fallback_pct
      FROM reports
      WHERE policy_version IS NOT NULL;

      \echo === DISTINCT POLICY-IDs (Top 30, sortiert nach Frequenz) ===
      SELECT pid, count(*) AS hits
      FROM reports r,
           LATERAL unnest(r.policy_id_distinct) AS pid
      WHERE r.policy_version IS NOT NULL
      GROUP BY pid
      ORDER BY 2 DESC, 1 ASC
      LIMIT 30;

      \echo === FINDINGS_DATA ARRAY-LAENGE STATS ===
      SELECT
        round(avg(jsonb_array_length(findings_data->'findings'))::numeric, 1) AS avg_findings_per_report,
        min(jsonb_array_length(findings_data->'findings')) AS min_findings,
        max(jsonb_array_length(findings_data->'findings')) AS max_findings,
        count(*) AS reports
      FROM reports
      WHERE jsonb_typeof(findings_data->'findings') = 'array';

      \echo === POSITIVE FINDINGS (positive_findings JSONB-Array) ===
      SELECT
        round(avg(jsonb_array_length(findings_data->'positive_findings'))::numeric, 1)
            AS avg_positive_findings,
        count(*) FILTER (WHERE jsonb_array_length(findings_data->'positive_findings') > 0)
            AS reports_with_positive,
        count(*) AS total_reports
      FROM reports
      WHERE findings_data ? 'positive_findings';

      \echo === RAW SAMPLE: erstes finding pro neueren Report ===
      SELECT
        r.id::text AS report_id,
        o.target_url,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].title')    AS first_finding_title,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].severity') AS first_finding_severity,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].policy_id') AS first_finding_policy
      FROM reports r
      LEFT JOIN orders o ON o.id = r.order_id
      WHERE r.policy_version IS NOT NULL
      ORDER BY r.created_at DESC
      LIMIT 10;
      SQL

# Rollback: Compose-Snapshot + .env.bak zurueckspielen + Container hochfahren.
rollback:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - cp docker-compose.yml.bak docker-compose.yml
    - cp .env.bak .env
    - docker compose pull
    - docker compose up -d --remove-orphans
    - sleep 30
    - docker compose ps
  environment:
    name: production
    url: https://scan.vectigal.tech

# =============================================================================
# CLEANUP-PROD — Big-Bang Wipe (Q2/2026 Determinismus-Reset)
# =============================================================================
# Triggert scripts/cleanup-prod.sh auf vectigal-docker02. Wipet alle Scan-
# Daten, Reports, Subscriptions, MinIO-Objekte, Threat-Intel/AI-Caches.
# Erhalten bleiben users, customers, verified_domains, Schema.
#
# Nutzung:
#   1. Auf einer main-Pipeline in der GitLab-UI den `cleanup-prod`-Job
#      ausloesen UND die Job-Variable CLEANUP_CONFIRM=vectiscan-prod setzen
#      (Variable im "Run job"-Dialog eintragen).
#   2. Optional: CLEANUP_NO_BACKUP=true ueberspringt das pg_dump-Backup.
#   3. Ohne CLEANUP_CONFIRM bricht der Job sofort mit Hinweis ab — Schutz
#      vor versehentlichem Klick.
#
# Spec: docs/deterministic/01-cleanup.md, 99-CUTOVER.md
# =============================================================================

cleanup-prod:
  extends: .ops-base
  variables:
    # Override per Pipeline-Run via CI/CD-Variables.
    CLEANUP_CONFIRM: ""
    CLEANUP_NO_BACKUP: "false"
  script:
    - |
      if [ "$CLEANUP_CONFIRM" != "vectiscan-prod" ]; then
        echo "ERROR: Set CLEANUP_CONFIRM=vectiscan-prod in the pipeline-run form to confirm."
        echo "       (Job wurde versehentlich getriggert oder Bestaetigung fehlt.)"
        exit 1
      fi
    - cd ${DEPLOY_PATH}
    - cp -f ${CI_PROJECT_DIR}/scripts/cleanup-prod.sh ./cleanup-prod.sh
    - chmod +x ./cleanup-prod.sh
    - |
      # Bestaetigung an das Skript durchpipen + optional --no-backup
      ARGS="--confirm"
      if [ "$CLEANUP_NO_BACKUP" = "true" ]; then ARGS="$ARGS --no-backup"; fi
      CONFIRMATION_STRING=vectiscan-prod \
      PROJECT_ROOT=${DEPLOY_PATH} \
        bash -c "echo vectiscan-prod | ./cleanup-prod.sh $ARGS"
  environment:
    name: production
    url: https://scan.vectigal.tech
