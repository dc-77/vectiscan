    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - python3 scripts/sync-known-vuln-builds.py
    - python3 scripts/_sync_commit.py report-worker/reporter/known_vuln_builds_generated.py

# Triggert scripts/cleanup-prod.sh auf vectigal-docker02. Wipet alle Scan-
# Daten, Reports, Subscriptions, MinIO-Objekte, Threat-Intel/AI-Caches.
# Erhalten bleiben users, customers, verified_domains, Schema.
#
# Nutzung:
#   1. Auf einer main-Pipeline in der GitLab-UI den `cleanup-prod`-Job
#      ausloesen UND die Job-Variable CLEANUP_CONFIRM=vectiscan-prod setzen
#      (Variable im "Run job"-Dialog eintragen).
#   2. Optional: CLEANUP_NO_BACKUP=true ueberspringt das pg_dump-Backup.
#   3. Ohne CLEANUP_CONFIRM bricht der Job sofort mit Hinweis ab — Schutz
#      vor versehentlichem Klick.
#
# Spec: docs/deterministic/01-cleanup.md, 99-CUTOVER.md
# =============================================================================

cleanup-prod:
  extends: .ops-base
  variables:
    # Override per Pipeline-Run via CI/CD-Variables.
    CLEANUP_CONFIRM: ""
    CLEANUP_NO_BACKUP: "false"
  script:
    - |
      if [ "$CLEANUP_CONFIRM" != "vectiscan-prod" ]; then
        echo "ERROR: Set CLEANUP_CONFIRM=vectiscan-prod in the pipeline-run form to confirm."
        echo "       (Job wurde versehentlich getriggert oder Bestaetigung fehlt.)"
        exit 1
      fi
    - cd ${DEPLOY_PATH}
    - cp -f ${CI_PROJECT_DIR}/scripts/cleanup-prod.sh ./cleanup-prod.sh
    - chmod +x ./cleanup-prod.sh
    - |
      # Bestaetigung an das Skript durchpipen + optional --no-backup
      ARGS="--confirm"
      if [ "$CLEANUP_NO_BACKUP" = "true" ]; then ARGS="$ARGS --no-backup"; fi
      CONFIRMATION_STRING=vectiscan-prod \
      PROJECT_ROOT=${DEPLOY_PATH} \
        bash -c "echo vectiscan-prod | ./cleanup-prod.sh $ARGS"
  environment:
    name: production
    url: https://scan.vectigal.tech

# =============================================================================
# VEC-143 — Edge-Auth-Gating: schliesst die internal-only-Flaechen per Basic-Auth.
#
# Root-Cause (VEC-143, bewiesen): die IP-Allowlist `internal-only@file` ist auf
# vectigal-docker02 wirkungslos. `/etc/docker/daemon.json` hat `iptables:false`
# -> userland docker-proxy SNAT't jede Quell-IP auf das Bridge-GW 172.18.0.1
# (in 172.16.0.0/12) -> intern/extern an Traefik ununterscheidbar, 403 feuert nie.
# Kein X-Forwarded-For -> ipStrategy/trustedIPs unmoeglich.
#
# Board-approved Fix (Option C): basicAuth-Middleware `internal-auth`, ADDITIV in
# den host-eigenen File-Provider (/opt/traefik/config, watch:true) geschrieben;
# die 4 betroffenen Router (web-admin, api-admin, status, logs) haengen in der
# docker-compose.yml jetzt an `internal-auth@file` statt `internal-only@file`.
# Das host-eigene security.yml bleibt unangetastet (kein Shared-Edge-Eingriff).
#
# Credential kommt aus der maskierten Pipeline-Variable TRAEFIK_INTERNAL_HTPASSWD
# (Format `user:hash`, apr1/bcrypt). KEIN Secret im Repo. Manuell/API-getriggert,
# KEIN Image-Build/-Pull (needs:[]). Idempotent.
# =============================================================================
ops-traefik-auth:
  extends: .ops-base
  needs: []
  variables:
    TRAEFIK_CFG: /opt/traefik/config
  # Eigene Rules: .ops-base auf main hat (noch) keine api-Source-Regel (der
  # VEC-155-Fix lebt nur auf fix/vec-121). Daher hier explizit api/web/main
  # anbieten, damit der Paperclip-Agent den Job per API-Pipeline starten kann.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - |
      if [ -z "${TRAEFIK_INTERNAL_HTPASSWD}" ]; then
        echo "FATAL: Pipeline-Variable TRAEFIK_INTERNAL_HTPASSWD fehlt (Format user:hash)."; exit 1
      fi
    # Traefik-Container ermitteln (fuer Netzwerk/Reload-Check). Der File-Provider
    # liest aus /etc/traefik/config (= Host /opt/traefik/config, READ-ONLY in den
    # Traefik-Container gemountet). Der Runner (gitlab-runner) darf /opt/traefik/config
    # NICHT direkt schreiben (root:root) und der Traefik-Mount ist ro. Deshalb wird
    # ueber einen kurzlebigen Helfer-Container mit eigenem RW-Bind-Mount geschrieben:
    # der Docker-Daemon laeuft als root, der Bind-Mount persistiert auf den Host,
    # Traefik (watch:true) laedt die neue Datei hot.
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      if [ -z "$TRAEFIK" ]; then echo "FATAL: kein Traefik-Container gefunden."; exit 1; fi
      echo "Traefik-Container: $TRAEFIK"
    - TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
    - HELPER=busybox:1.36
    - docker image inspect "$HELPER" >/dev/null 2>&1 || docker pull "$HELPER"
    # 0) Klartext-Credential host-persistieren (optional), damit Operatoren es per
    #    `sudo cat /opt/traefik/config/.vectiscan-internal-cred` abholen koennen —
    #    kein Klartext im Repo/Board (Muster wie .demo_password, VEC-154).
    - |
      if [ -n "${TRAEFIK_INTERNAL_CRED_PLAINTEXT}" ]; then
        docker run --rm --user 0:0 -e C="${TRAEFIK_INTERNAL_CRED_PLAINTEXT}" \
          -v "${TRAEFIK_CFG}:/cfg" "$HELPER" \
          sh -c 'printf "%s\n" "$C" > /cfg/.vectiscan-internal-cred && chmod 600 /cfg/.vectiscan-internal-cred'
        echo "Klartext-Credential persistiert nach ${TRAEFIK_CFG}/.vectiscan-internal-cred (chmod 600)."
      else
        echo "Kein TRAEFIK_INTERNAL_CRED_PLAINTEXT gesetzt — ueberspringe Klartext-Persistierung."
      fi
    # 1) basicAuth-Middleware additiv in den Host-File-Provider schreiben.
    - |
      RENDERED=$(sed "s#__TRAEFIK_INTERNAL_HTPASSWD__#${TRAEFIK_INTERNAL_HTPASSWD}#" ${CI_PROJECT_DIR}/traefik/dynamic/vectiscan-auth.yml)
      docker run --rm --user 0:0 -e C="$RENDERED" \
        -v "${TRAEFIK_CFG}:/cfg" "$HELPER" \
        sh -c 'printf "%s\n" "$C" > /cfg/vectiscan-auth.yml && chmod 644 /cfg/vectiscan-auth.yml'
    - echo "=== vectiscan-auth.yml geschrieben ==="; docker run --rm -v "${TRAEFIK_CFG}:/cfg:ro" "$HELPER" ls -la /cfg/vectiscan-auth.yml || true
    # 2) Traefik (watch:true) laedt hot — warten und Middleware-Existenz pruefen.
    - sleep 6
    - |
      NET=$(docker inspect "$TRAEFIK" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
      echo "Traefik=${TRAEFIK} Net=${NET}"
      echo "--- middleware internal-auth@file ---"
      docker run --rm --network "$NET" curlimages/curl:8.8.0 -s --max-time 8 "http://${TRAEFIK}:8080/api/http/middlewares/internal-auth@file" || echo "(middleware-check fehlgeschlagen)"
    # 3) Aktive-Scan-Guard (analog .deploy-base), dann die 4 Router neu labeln.
    - cd ${DEPLOY_PATH}
    - |
      if [ "${DEPLOY_FORCE:-false}" != "true" ]; then
        ACTIVE=$(docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -tAc "SELECT count(*) FROM orders WHERE status IN ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')" 2>/dev/null | tr -d '[:space:]' || echo "?")
        if [ "$ACTIVE" != "?" ] && [ "${ACTIVE:-0}" -gt 0 ]; then
          echo "ERROR: $ACTIVE aktive Scan(s) — abgebrochen. DEPLOY_FORCE=true zum Erzwingen."; exit 1
        fi
        echo "Aktive Scans: ${ACTIVE:-0} — ok."
      fi
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    - TAG=${TAG:-latest} docker compose up -d --no-deps --no-build frontend api uptime-kuma grafana
    - sleep 10
    - docker compose ps frontend api uptime-kuma grafana
    # 4) Verifikation: die 4 Router haengen jetzt an internal-auth.
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      NET=$(docker inspect "$TRAEFIK" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
      for R in vectiscan-web-admin vectiscan-api-admin vectiscan-status vectiscan-logs; do
        echo "--- router ${R}@docker ---"
        docker run --rm --network "$NET" curlimages/curl:8.8.0 -s --max-time 8 "http://${TRAEFIK}:8080/api/http/routers/${R}@docker" | head -c 500; echo
      done
    # 5) VEC-167 — Live-Smoke: Edge-Gate ist case-INSENSITIV. Sowohl die Original-
    #    Schreibweise als auch Case-Varianten muessen 401 liefern (nicht 404).
    #    Nicht-fatal (Job-Verifikation/Evidenz); FAIL wird explizit markiert.
    - |
      echo "=== VEC-167 Edge-Case-Smoke (extern, Basic-Auth ist IP-unabhaengig) ==="
      VEC167_FAIL=0
      check_code() { # $1=url  $2=erwartet
        CODE=$(docker run --rm curlimages/curl:8.8.0 -s -o /dev/null -w '%{http_code}' --max-time 12 "$1" 2>/dev/null || echo "ERR")
        if [ "$CODE" = "$2" ]; then echo "PASS  $1 -> $CODE"; else echo "FAIL  $1 -> $CODE (erwartet $2)"; VEC167_FAIL=1; fi
      }
      # Edge-Gate (401 erwartet) — Original + Case-Varianten
      check_code "https://scan.vectigal.tech/admin"                     401
      check_code "https://scan.vectigal.tech/ADMIN"                     401
      check_code "https://scan.vectigal.tech/Admin"                     401
      check_code "https://scan-api.vectigal.tech/api/admin/review/queue" 401
      check_code "https://scan-api.vectigal.tech/api/ADMIN/review/queue" 401
      check_code "https://scan-api.vectigal.tech/api/Admin/review/queue" 401
      check_code "https://status.vectigal.tech/"                        401
      # Oeffentlich (200 erwartet) — darf NICHT mit-gegated werden
      check_code "https://scan.vectigal.tech/"                          200
      if [ "$VEC167_FAIL" = "1" ]; then
        echo "VEC-167-SMOKE: FAIL — Edge-Gate nicht case-insensitiv ODER public mit-gegated. Pruefen/Revert."
      else
        echo "VEC-167-SMOKE: ALLE PASS — Edge-Gate case-insensitiv, public unveraendert."
      fi
    - echo "=== FERTIG ==="
  environment:
    name: production
    url: https://scan.vectigal.tech



# =============================================================================
ops-provision-turnstile:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - |
      set -e

      if [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_ACCOUNT_ID}" ]; then
        echo "ERROR: CF_API_TOKEN und CF_ACCOUNT_ID muessen als maskierte CI/CD-Variablen gesetzt sein."
        exit 1
      fi
      if [ -z "${GL_WRITE_TOKEN}" ]; then
        echo "ERROR: GL_WRITE_TOKEN (GitLab PAT api-Scope + Maintainer) fehlt."
        echo "       GitLab: User Settings -> Access Tokens -> api-Scope -> als CI-Var GL_WRITE_TOKEN setzen."
        exit 1
      fi

      echo "Erstelle Cloudflare Turnstile Widget fuer scan.vectigal.tech + vectigal.tech ..."
      CF_RESPONSE=$(curl -s -f -X POST \
        "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/challenges/widgets" \
        -H "Authorization: Bearer ${CF_API_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{"name":"VectiScan Webcheck","domains":["scan.vectigal.tech","vectigal.tech"],"mode":"managed","offlabel":false}')

      CF_SUCCESS=$(echo "${CF_RESPONSE}" | sed -n 's/.*"success":\([a-z]*\).*/\1/p' | head -1)
      if [ "${CF_SUCCESS}" != "true" ]; then
        echo "ERROR: Cloudflare API Fehler (Secret redacted):"
        echo "${CF_RESPONSE}" | sed 's/"secret":"[^"]*"/"secret":"[REDACTED]"/g'
        exit 1
      fi

      SITE_KEY=$(echo "${CF_RESPONSE}" | sed -n 's/.*"sitekey":"\([^"]*\)".*/\1/p')
      SECRET_KEY=$(echo "${CF_RESPONSE}" | sed -n 's/.*"secret":"\([^"]*\)".*/\1/p')

      if [ -z "${SITE_KEY}" ] || [ -z "${SECRET_KEY}" ]; then
        echo "ERROR: Konnte Site-Key oder Secret-Key nicht aus CF-Antwort extrahieren."
        exit 1
      fi

      echo "Widget angelegt. Site Key: ${SITE_KEY}"
      echo "Secret Key: [MASKED]"

      GL_VARS_API="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/variables"

      _set_var() {
        local KEY="$1" MASKED="$3"
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "${GL_VARS_API}/${KEY}" \
          -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
          --data-urlencode "value=$2" \
          -d "masked=${MASKED}&protected=false&variable_type=env_var")
        if [ "${HTTP}" = "404" ]; then
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${GL_VARS_API}" \
            -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
            --data-urlencode "key=${KEY}" \
            --data-urlencode "value=$2" \
            -d "masked=${MASKED}&protected=false&variable_type=env_var")
        fi
        echo "  ${KEY}: HTTP ${HTTP}"
        [ "${HTTP}" = "200" ] || [ "${HTTP}" = "201" ] || { echo "ERROR: Konnte ${KEY} nicht setzen."; return 1; }
      }

      echo "Setze GitLab CI-Variablen ..."
      _set_var "NEXT_PUBLIC_TURNSTILE_SITE_KEY" "${SITE_KEY}" "false"
      _set_var "WEBCHECK_TURNSTILE_SECRET" "${SECRET_KEY}" "true"

      echo "=== Provisionierung abgeschlossen ==="
      echo "  NEXT_PUBLIC_TURNSTILE_SITE_KEY = ${SITE_KEY}"
      echo "  WEBCHECK_TURNSTILE_SECRET      = [MASKED]"
      echo "  Naechster Schritt: feat/vec-189-turnstile-widget mergen + build triggern."

# =============================================================================
# VEC-326: Twenty CRM Admin-Zugang für daniel.czischke@bs-consulting-gmbh.de
# Einmaliger Ops-Job:
#   1) docker-compose.yml (mit Email-Config) auf den Server kopieren
#   2) twenty-server neu starten (Email-Config aktivieren)
#   3) Workspace-Einladung über Twenty GraphQL API senden
#   4) Traefik-Zugangsdaten + vollständige CRM-Anleitung via Resend versenden
# Voraussetzung: CRM_API_KEY gesetzt, RESEND_API_KEY gesetzt, CRM läuft.
# needs:[] -> sofort manuell spielbar ohne Build/Deploy.
# rules: api-Source mit when:always damit der Paperclip-Agent ihn per API
# direkt auslösen kann.
# =============================================================================
ops-twenty-admin-invite:
  extends: .ops-base
  needs: []
  variables:
    TARGET_EMAIL: "daniel.czischke@bs-consulting-gmbh.de"
    TRAEFIK_CFG: /opt/traefik/config
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== VEC-326 Twenty Admin Setup fuer ${TARGET_EMAIL} ==="
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    - echo "OK docker-compose.yml aktualisiert EMAIL_DRIVER=smtp fuer twenty-server"
    - COMPOSE_PROFILES=crm docker compose up -d twenty-server --force-recreate
    - sleep 60
    - COMPOSE_PROFILES=crm docker compose ps twenty-server
    - |
      INVITE_STATUS=UNKNOWN
      if [ -z "${CRM_API_KEY}" ]; then
        echo "WARN CRM_API_KEY leer Twenty-Invite uebersprungen"
        INVITE_STATUS=SKIPPED_NO_KEY
      else
        # Nutze node.js (immer in twentycrm-Image) statt curl (ggf. nicht installiert)
        # sendInvitations mit __typename als sicherem Subfield-Selector
        NODE_INVITE="const http=require('http');const key='${CRM_API_KEY}';const email='${TARGET_EMAIL}';const q=JSON.stringify({query:'mutation{sendInvitations(emails:[\"'+email+'\"]){__typename}}'});function post(path,cb){const o={hostname:'localhost',port:3000,path,method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,'Content-Length':Buffer.byteLength(q)}};const r=http.request(o,res=>{let b='';res.on('data',c=>b+=c);res.on('end',()=>cb(b))});r.on('error',e=>cb('ERR:'+e.message));r.write(q);r.end()}post('/metadata',r=>{process.stdout.write(r+'\n');if(!r.includes('\"errors\"'))process.exit(0);post('/graphql',r2=>{process.stdout.write('G:'+r2+'\n');process.exit(0)})})"
        INVITE_RESP=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-server node -e "${NODE_INVITE}" 2>/dev/null || echo EXEC_ERROR)
        echo "Invite response: ${INVITE_RESP}"
        if echo "${INVITE_RESP}" | grep -qvE '"errors":|EXEC_ERROR'; then
          INVITE_STATUS=OK
        else
          INVITE_STATUS=FAILED
        fi
      fi
      echo "Invite status ${INVITE_STATUS}"
      export INVITE_STATUS
    - |
      TRAEFIK_USER=intern
      TRAEFIK_PASS="bitte beim Admin erfragen"
      # Lese Traefik-Cred via busybox-Helper (Datei ist root:root 600)
      TRAEFIK_CRED=$(docker run --rm --user 0:0 -v "${TRAEFIK_CFG}:/cfg:ro" busybox:1.36 \
        sh -c 'cat /cfg/.vectiscan-internal-cred 2>/dev/null || echo ""' 2>/dev/null || echo "")
      if [ -n "${TRAEFIK_CRED}" ]; then
        TRAEFIK_USER=$(printf '%s' "${TRAEFIK_CRED}" | cut -d: -f1)
        TRAEFIK_PASS=$(printf '%s' "${TRAEFIK_CRED}" | cut -d: -f2-)
        echo "OK Traefik-Credential gelesen user=${TRAEFIK_USER} pass=MASKED"
      else
        echo "WARN Traefik-Cred nicht lesbar"
      fi
      export TRAEFIK_USER TRAEFIK_PASS
      # RESEND_API_KEY ist protected und auf unprotected Branch nicht verfuegbar.
      # Fallback: RESEND_MANAGEMENT (nicht-protected, immer injiziert).
      if [ -z "${RESEND_API_KEY}" ]; then
        echo "INFO: RESEND_API_KEY leer (protected Branch-Var), nutze RESEND_MANAGEMENT"
        export RESEND_API_KEY="${RESEND_MANAGEMENT:-}"
      fi
      if [ -z "${RESEND_API_KEY}" ]; then
        echo "ERROR: Kein Resend-Key verfuegbar"; exit 1
      fi
      python3 ${CI_PROJECT_DIR}/scripts/vec326-crm-guide.py
    - echo "=== VEC-326 abgeschlossen ==="

# =============================================================================
# VEC-326 DB-Fallback: Twenty Admin-User direkt in DB anlegen
# Wird getriggert wenn ops-twenty-admin-invite den Invite nicht senden konnte
# (CRM_API_KEY hat keine Invite-Berechtigung). Fuegt Daniel als Admin-Member
# direkt in die twenty-db ein — kein Restart noetig.
# =============================================================================
ops-twenty-create-user-db:
  extends: .ops-base
  needs:
    - job: ops-twenty-admin-invite
      optional: true
  variables:
    TARGET_EMAIL: "daniel.czischke@bs-consulting-gmbh.de"
    TARGET_FIRST: "Daniel"
    TARGET_LAST: "Czischke"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== VEC-326 DB-Fallback Anlegen von ${TARGET_EMAIL} in Twenty ==="
    - |
      # 1) Temporaeres Passwort generieren (persistent auf Host, wie .demo_password)
      PWD_FILE="${DEPLOY_PATH}/.vec326_crm_password"
      if [ ! -f "${PWD_FILE}" ]; then
        TEMP_PASS="CRM-$(openssl rand -hex 8)-2026!"
        ( umask 077; printf '%s\n' "${TEMP_PASS}" > "${PWD_FILE}" )
        chmod 600 "${PWD_FILE}"
        echo "OK: Temp-Passwort generiert und in ${PWD_FILE} gespeichert"
      else
        TEMP_PASS=$(cat "${PWD_FILE}")
        echo "OK: Bestehendes Temp-Passwort aus ${PWD_FILE} gelesen"
      fi
      export TEMP_PASS
    - |
      # 2) Passwort-Hash via bcrypt im laufenden twenty-server (base64 zur sicheren Uebergabe)
      PASS_B64=$(printf '%s' "${TEMP_PASS}" | base64 -w0)
      HASH=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-server \
        node -e "const p=Buffer.from('${PASS_B64}','base64').toString();let b;try{b=require('bcrypt')}catch(e){b=require('bcryptjs')};if(typeof b.hashSync==='function'){process.stdout.write(b.hashSync(p,10)+'\n')}else{b.hash(p,10).then(h=>process.stdout.write(h+'\n'))}" \
        2>/dev/null | head -1 | tr -d '[:space:]' || echo "")
      if [ -z "${HASH}" ] || [ ${#HASH} -lt 50 ]; then
        echo "ERROR: Bcrypt-Hash ungueltig oder leer (Laenge=${#HASH})"; exit 1
      fi
      echo "OK: Bcrypt-Hash generiert (Laenge=${#HASH})"
      export HASH
    - |
      # 3) Workspace + Admin-User direkt in PostgreSQL anlegen
      # (Twenty v2.9.0 hat keinen REST/GraphQL-Endpoint für First-Setup)
      set +e  # Fehler-Check explizit, nicht per set -e
      echo "=== Schema Discovery ==="
      ALL_SCHEMAS=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
        psql -U twenty -d twenty -tAc \
        "SELECT schema_name FROM information_schema.schemata WHERE schema_name NOT IN ('pg_catalog','information_schema') ORDER BY 1;" \
        2>/dev/null | tr '\n' ',' || echo "NO_CONN")
      echo "Schemas: ${ALL_SCHEMAS}"
      ALL_TABLES=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
        psql -U twenty -d twenty -tAc \
        "SELECT table_schema||'.'||table_name FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog','information_schema') ORDER BY 1 LIMIT 50;" \
        2>/dev/null | tr '\n' '|' || echo "")
      echo "All tables: ${ALL_TABLES}"
      WORKSPACE_COUNT=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
        psql -U twenty -d twenty -tAc "SELECT count(*) FROM workspace;" 2>/dev/null | tr -d '[:space:]')
      if [ -z "${WORKSPACE_COUNT}" ]; then WORKSPACE_COUNT=0; fi
      echo "Workspace-Count: ${WORKSPACE_COUNT}"
      if [ "${WORKSPACE_COUNT}" = "0" ]; then
        echo "INFO: Lege Workspace + Admin-User per SQL an"
        WS_ID=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc "SELECT gen_random_uuid();" 2>&1 | tr -d '[:space:]')
        USER_UUID=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc "SELECT gen_random_uuid();" 2>&1 | tr -d '[:space:]')
        # pgcrypto-free invite hash using md5+clock_timestamp
        INVITE_HASH=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc \
          "SELECT substring(md5(random()::text||clock_timestamp()::text) for 32);" 2>&1 | tr -d '[:space:]')
        echo "WS_ID=${WS_ID} USER_UUID=${USER_UUID} INVITE_HASH=${INVITE_HASH}"
        # Insert workspace
        WS_RESULT=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc \
          "INSERT INTO workspace (id, display_name, subscription_status, plan, invite_hash)
           VALUES ('${WS_ID}', 'VectiScan CRM', 'active', 'FREE', '${INVITE_HASH}')
           ON CONFLICT DO NOTHING RETURNING id;" 2>&1)
        echo "Workspace: ${WS_RESULT}"
        if echo "${WS_RESULT}" | grep -q "ERROR"; then
          echo "WARN: Workspace-Insert fehlgeschlagen — Schema-Info:"
          COMPOSE_PROFILES=crm docker compose exec -T twenty-db psql -U twenty -d twenty -tAc \
            "SELECT column_name,is_nullable,column_default FROM information_schema.columns WHERE table_schema='public' AND table_name='workspace' ORDER BY ordinal_position;" 2>&1
          exit 1
        fi
        # Insert user
        USER_RESULT=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc \
          "INSERT INTO \"user\" (id, email, password_hash, first_name, last_name, default_workspace_id, email_verified)
           VALUES ('${USER_UUID}', '${TARGET_EMAIL}', '${HASH}', '${TARGET_FIRST}', '${TARGET_LAST}', '${WS_ID}', true)
           ON CONFLICT (email) DO UPDATE SET password_hash='${HASH}', default_workspace_id='${WS_ID}', email_verified=true
           RETURNING id;" 2>&1)
        echo "User: ${USER_RESULT}"
        if echo "${USER_RESULT}" | grep -q "ERROR"; then
          echo "WARN: User-Insert fehlgeschlagen — Schema-Info:"
          COMPOSE_PROFILES=crm docker compose exec -T twenty-db psql -U twenty -d twenty -tAc \
            "SELECT column_name,is_nullable,column_default FROM information_schema.columns WHERE table_schema='public' AND table_name='user' ORDER BY ordinal_position;" 2>&1
          exit 1
        fi
        # Get confirmed user ID
        ACTUAL_USER_ID=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc \
          "SELECT id FROM \"user\" WHERE email='${TARGET_EMAIL}';" 2>/dev/null | tr -d '[:space:]')
        echo "Confirmed user ID: ${ACTUAL_USER_ID}"
        # Insert user-workspace junction (try both common table names)
        UW_TABLE=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
          psql -U twenty -d twenty -tAc \
          "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('user_workspace','workspace_member') LIMIT 1;" \
          2>/dev/null | tr -d '[:space:]')
        echo "UW Table: ${UW_TABLE}"
        if [ -n "${UW_TABLE}" ]; then
          UW_RESULT=$(COMPOSE_PROFILES=crm docker compose exec -T twenty-db \
            psql -U twenty -d twenty -tAc \
            "INSERT INTO ${UW_TABLE} (id, user_id, workspace_id, role)
             VALUES (gen_random_uuid(), '${ACTUAL_USER_ID}', '${WS_ID}', 'OWNER')
             ON CONFLICT DO NOTHING RETURNING id;" 2>&1)
          echo "UserWorkspace: ${UW_RESULT}"
        else
          echo "WARN: Kein user_workspace/workspace_member table gefunden"
        fi
        WORKSPACE_SETUP=DONE
      else
        echo "OK: Workspace vorhanden — ueberspringe"
        WORKSPACE_SETUP=EXISTING
      fi
      export WORKSPACE_SETUP
    - |
      # 4) Login-Credentials-Email via Resend (curl, wie guide-email)
      RESEND_KEY="${RESEND_API_KEY:-${RESEND_MANAGEMENT:-}}"
      if [ -z "${RESEND_KEY}" ]; then
        echo "WARN: Kein Resend-Key — kein Credentials-Email"; exit 0
      fi
      ACTUAL_PASS=$(cat "${PWD_FILE}")
      EMAIL_JSON="{\"from\":\"VectiScan <noreply@vectiscan.de>\",\"to\":[\"${TARGET_EMAIL}\"],\"subject\":\"Ihr VectiScan CRM Login\",\"html\":\"<p>Sehr geehrter Herr Czischke,</p><p>Ihr Twenty-CRM-Konto ist einsatzbereit.</p><table style='border-collapse:collapse'><tr><td style='padding:8px;border:1px solid #ddd;background:#f5f5f5'><b>URL</b></td><td style='padding:8px;border:1px solid #ddd'><a href='https://crm.vectigal.tech'>https://crm.vectigal.tech</a></td></tr><tr><td style='padding:8px;border:1px solid #ddd;background:#f5f5f5'><b>E-Mail</b></td><td style='padding:8px;border:1px solid #ddd'>${TARGET_EMAIL}</td></tr><tr><td style='padding:8px;border:1px solid #ddd;background:#f5f5f5'><b>Passwort</b></td><td style='padding:8px;border:1px solid #ddd;font-family:monospace'>${ACTUAL_PASS}</td></tr></table><p>Bitte aendern Sie das Passwort nach dem ersten Login in den Einstellungen. Sie sind Workspace-Owner.</p><p>VectiScan-Team</p>\"}"
      curl -sf -X POST https://api.resend.com/emails \
        -H "Authorization: Bearer ${RESEND_KEY}" \
        -H "Content-Type: application/json" \
        -d "${EMAIL_JSON}" \
        && echo "OK: Credentials-Email gesendet" || echo "WARN: Credentials-Email fehlgeschlagen"
    - echo "=== VEC-326 DB-Fallback abgeschlossen ==="
