# =============================================================================
ops-provision-turnstile:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - |
      set -e

      if [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_ACCOUNT_ID}" ]; then
        echo "ERROR: CF_API_TOKEN und CF_ACCOUNT_ID muessen als maskierte CI/CD-Variablen gesetzt sein."
        exit 1
      fi
      if [ -z "${GL_WRITE_TOKEN}" ]; then
        echo "ERROR: GL_WRITE_TOKEN (GitLab PAT api-Scope + Maintainer) fehlt."
        echo "       GitLab: User Settings -> Access Tokens -> api-Scope -> als CI-Var GL_WRITE_TOKEN setzen."
        exit 1
      fi

      echo "Erstelle Cloudflare Turnstile Widget fuer scan.vectigal.tech + vectigal.tech ..."
      CF_RESPONSE=$(curl -s -f -X POST \
        "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/challenges/widgets" \
        -H "Authorization: Bearer ${CF_API_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{"name":"VectiScan Webcheck","domains":["scan.vectigal.tech","vectigal.tech"],"mode":"managed","offlabel":false}')

      CF_SUCCESS=$(echo "${CF_RESPONSE}" | sed -n 's/.*"success":\([a-z]*\).*/\1/p' | head -1)
      if [ "${CF_SUCCESS}" != "true" ]; then
        echo "ERROR: Cloudflare API Fehler (Secret redacted):"
        echo "${CF_RESPONSE}" | sed 's/"secret":"[^"]*"/"secret":"[REDACTED]"/g'
        exit 1
      fi

      SITE_KEY=$(echo "${CF_RESPONSE}" | sed -n 's/.*"sitekey":"\([^"]*\)".*/\1/p')
      SECRET_KEY=$(echo "${CF_RESPONSE}" | sed -n 's/.*"secret":"\([^"]*\)".*/\1/p')

      if [ -z "${SITE_KEY}" ] || [ -z "${SECRET_KEY}" ]; then
        echo "ERROR: Konnte Site-Key oder Secret-Key nicht aus CF-Antwort extrahieren."
        exit 1
      fi

      echo "Widget angelegt. Site Key: ${SITE_KEY}"
      echo "Secret Key: [MASKED]"

      GL_VARS_API="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/variables"

      _set_var() {
        local KEY="$1" MASKED="$3"
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "${GL_VARS_API}/${KEY}" \
          -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
          --data-urlencode "value=$2" \
          -d "masked=${MASKED}&protected=false&variable_type=env_var")
        if [ "${HTTP}" = "404" ]; then
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${GL_VARS_API}" \
            -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
            --data-urlencode "key=${KEY}" \
            --data-urlencode "value=$2" \
            -d "masked=${MASKED}&protected=false&variable_type=env_var")
        fi
        echo "  ${KEY}: HTTP ${HTTP}"
        [ "${HTTP}" = "200" ] || [ "${HTTP}" = "201" ] || { echo "ERROR: Konnte ${KEY} nicht setzen."; return 1; }
      }

      echo "Setze GitLab CI-Variablen ..."
      _set_var "NEXT_PUBLIC_TURNSTILE_SITE_KEY" "${SITE_KEY}" "false"
      _set_var "WEBCHECK_TURNSTILE_SECRET" "${SECRET_KEY}" "true"

      echo "=== Provisionierung abgeschlossen ==="
      echo "  NEXT_PUBLIC_TURNSTILE_SITE_KEY = ${SITE_KEY}"
      echo "  WEBCHECK_TURNSTILE_SECRET      = [MASKED]"
      echo "  Naechster Schritt: feat/vec-189-turnstile-widget mergen + build triggern."

# =============================================================================
# VEC-328 — Traefik twenty-api@docker Router-Fix (Force-Recreate twenty-server)
# twenty-server lief ohne COMPOSE_PROFILES=crm gestartet → Labels fehlen →
# twenty-api@docker nicht in Traefik registriert → /rest/* läuft über
# twenty@docker (internal-auth@file) → 401 → crm-lookup-failed.
# Dieser einmalige Ops-Job force-recreated twenty-server + twenty-worker
# damit Traefik die Labels aufnimmt und /rest/* korrekt geroutet wird.
# Danach entfällt dieser Job (oder bleibt als idempotenter Notfall-Reset).
# =============================================================================
ops-fix-crm-traefik-vec328:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    # --- Schritt 1: Traefik static config lesen (Docker provider + constraints) ---
    - |
      echo "=== /opt/traefik/traefik.yml ==="
      cat /opt/traefik/traefik.yml 2>/dev/null || echo "NICHT GEFUNDEN"
      echo ""
      echo "=== /opt/traefik/*.yml (alle Configs) ==="
      ls /opt/traefik/*.yml /opt/traefik/*.toml 2>/dev/null || echo "keine weiteren configs"
      echo ""
      echo "=== /opt/traefik/docker-compose.yml ==="
      cat /opt/traefik/docker-compose.yml 2>/dev/null || echo "NICHT GEFUNDEN"
    # --- Schritt 2: Traefik API via curl-Container (korrekte Methode) ---
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      TRAEFIK_IP=$(docker inspect "$TRAEFIK" --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
      echo "Traefik Container: $TRAEFIK | IP: $TRAEFIK_IP"
      echo ""
      echo "=== Alle Docker-Provider Routers (via curl auf proxy-net) ==="
      docker run --rm --network proxy-net curlimages/curl:8.8.0 -s --max-time 10 \
        "http://${TRAEFIK_IP}:8080/api/http/routers?per_page=200" 2>/dev/null \
        | tr ',' '\n' | grep '"name"' | sort | head -60
      echo ""
      echo "=== twenty@docker gezielt ==="
      docker run --rm --network proxy-net curlimages/curl:8.8.0 -s --max-time 10 \
        "http://${TRAEFIK_IP}:8080/api/http/routers/twenty@docker" 2>/dev/null | head -5
      echo ""
      echo "=== twenty-api@docker gezielt ==="
      docker run --rm --network proxy-net curlimages/curl:8.8.0 -s --max-time 10 \
        "http://${TRAEFIK_IP}:8080/api/http/routers/twenty-api@docker" 2>/dev/null | head -5
    # --- Schritt 3: socket-proxy Config (was darf Traefik sehen?) ---
    - |
      SPROXY=$(docker ps --format '{{.Names}}' | grep -i socket.proxy | head -1)
      echo "socket-proxy Container: $SPROXY"
      if [ -n "$SPROXY" ]; then
        echo "=== socket-proxy Env (Zugriffsliste) ==="
        docker inspect "$SPROXY" --format '{{range .Config.Env}}{{.}}{{"\n"}}{{end}}' | sort
      fi
    # --- Schritt 4: Force-Recreate twenty-server + twenty-worker ---
    - echo "=== Force-Recreate twenty-server + twenty-worker ==="
    - COMPOSE_PROFILES=crm docker compose up -d --force-recreate --no-build twenty-server twenty-worker
    - sleep 20
    - docker compose ps twenty-server twenty-worker
    # --- Schritt 5: Nach Recreate: Traefik Router via curl prüfen ---
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      TRAEFIK_IP=$(docker inspect "$TRAEFIK" --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
      echo "=== twenty-api@docker NACH Recreate ==="
      RESULT=$(docker run --rm --network proxy-net curlimages/curl:8.8.0 -s --max-time 10 \
        "http://${TRAEFIK_IP}:8080/api/http/routers/twenty-api@docker" 2>/dev/null)
      echo "$RESULT"
      if echo "$RESULT" | grep -q '"name"'; then
        echo "PASS: twenty-api@docker Router registriert"
      else
        echo "FAIL: Router fehlt trotz korrekter Labels — Root-Cause in Traefik-Config (constraints/network?)"
        exit 1
      fi
    # --- Schritt 6: Smoke-Test REST direkt ---
    - |
      TWENTY_IP=$(docker inspect vectiscan-twenty-server-1 \
        --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
      echo "=== REST Smoke-Test: http://${TWENTY_IP}:3000/rest/people ==="
      HTTP=$(docker run --rm curlimages/curl:8.8.0 -s -o /dev/null -w '%{http_code}' \
        --max-time 10 "http://${TWENTY_IP}:3000/rest/people?limit=1" 2>/dev/null)
      echo "HTTP Status: ${HTTP}"
    - echo "=== VEC-328 Diagnose abgeschlossen ==="

# =============================================================================
# ops-verify-crm-vec328: Post-Deploy-Verifikation — CRM_WEBHOOK_URL=intern +
# Direktzugriff vectiscan-api-1 → vectiscan-twenty-server-1 via proxy-net.
# Prüft: (1) CRM_WEBHOOK_URL im laufenden api-Container auf interne URL,
# (2) HTTP-Erreichbarkeit /rest/people ohne Traefik, (3) letzte CRM-Log-Zeilen.
# Bestanden wenn: URL=intern + HTTP != 000 + kein "crm-lookup-failed" in Logs.
# =============================================================================
ops-verify-crm-vec328:
  extends: .ops-base
  needs: []
  script:
    - cd ${DEPLOY_PATH}
    - docker compose exec -T api sh -c 'echo CRM_WEBHOOK_URL=${CRM_WEBHOOK_URL}' || echo api-nicht-erreichbar
    - |
      echo "=== CRM_API_KEY Laenge (kein Wert) ==="
      docker compose exec -T api sh -c 'klen=${#CRM_API_KEY}; echo "CRM_API_KEY length=${klen:-0}"' || echo api-nicht-erreichbar
      echo "=== HTTP-Status Twenty REST /rest/people (direkt aus api-Container) ==="
      docker compose exec -T api sh -c '
        HTTP_CODE=$(curl -s -o /tmp/crm_resp.json -w "%{http_code}" \
          -H "Authorization: Bearer $CRM_API_KEY" \
          http://vectiscan-twenty-server-1:3000/rest/people)
        echo "HTTP_STATUS:${HTTP_CODE}"
        head -c 300 /tmp/crm_resp.json
      ' || echo api-nicht-erreichbar
      echo "=== crm.ts WARN logs (HTTP-Status bei lookup failed) ==="
      docker logs --tail 3000 vectiscan-api-1 2>&1 | grep -E "CRM upsert: lookup failed|crm-lookup-failed" | tail -10 || echo PASS-kein-crm-lookup-failed

# =============================================================================
# ops-e2e-vec387: Post-Deploy-Runtime-Beleg CRM-Upsert via interner URL (VEC-387).
# Führt einen vollen DOI-Confirm durch und prüft ob api-Container crm=created/
# crm=exists loggt (statt crm-lookup-failed). Bestanden wenn: API-Log zeigt
# crm=created oder crm=exists nach dem Confirm-Aufruf.
# Grep erfasst jetzt auch den Demo-Lead-Pfad ("demo lead CRM") — VEC-407.
# needs: [] → läuft unabhängig, kein Re-Deploy erforderlich.
# =============================================================================
ops-e2e-vec387:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
  script:
    - cd ${DEPLOY_PATH}
    - |
      echo "=== VEC-387 Post-Deploy E2E: CRM crm=created Beleg ==="
      echo "Stack laeuft mit CRM_WEBHOOK_URL=intern (ca47dcf / Pipeline 2745)"
      docker compose exec -T postgres psql -U "${DB_USER}" -d "${DB_NAME}" \
        -c "DELETE FROM webcheck_leads WHERE email LIKE 'e2e-vec387%';" 2>&1 || true
      docker compose exec -T postgres psql -U "${DB_USER}" -d "${DB_NAME}" \
        -c "INSERT INTO webcheck_leads (email, domain, verification_token, doi_token, doi_sent_at, ip, marketing_consent, consent_text_version, consent_status, legal_basis)
            VALUES ('e2e-vec387@vectigal.tech', 'vectigal.tech', 'e2e-vec387-token', gen_random_uuid()::text, NOW(), '127.0.0.1', TRUE, 'v1-e2e', 'pending', 'consent');"
      DOI_TOKEN=$(docker compose exec -T postgres psql -U "${DB_USER}" -d "${DB_NAME}" -tAc \
        "SELECT doi_token FROM webcheck_leads WHERE email='e2e-vec387@vectigal.tech' AND consent_status='pending' ORDER BY created_at DESC LIMIT 1;" | tr -d '[:space:]')
      echo "DOI Token (clean): ${DOI_TOKEN}"
      echo "=== DOI Confirm via scan-api.vectigal.tech ==="
      curl -sv "https://scan-api.vectigal.tech/api/webcheck/doi/confirm?token=${DOI_TOKEN}" 2>&1 | grep -E "< HTTP|confirmed|success"
      sleep 5
      echo "=== API-Log: CRM-Routing (Beleg crm=created/exists) ==="
      docker compose logs --tail=100 --no-color api 2>&1 | grep -iE "crm=|crm-lookup-failed|webcheck lead CRM|demo lead CRM" | tail -15 || echo "(no CRM log entry found)"
      echo "=== CRM_WEBHOOK_URL im api-Container ==="
      docker compose exec -T api env | grep CRM_WEBHOOK_URL || echo api-nicht-erreichbar
      echo "=== Cleanup ==="
      docker compose exec -T postgres psql -U "${DB_USER}" -d "${DB_NAME}" \
        -c "DELETE FROM webcheck_leads WHERE email LIKE 'e2e-vec387%'; SELECT count(*) AS remaining FROM webcheck_leads WHERE email LIKE 'e2e-vec387%';"
      echo "=== VEC-387 E2E DONE ==="


# =============================================================================
# CRM-API-Key-Rotation (VEC-398 / Folge VEC-390/391) — API-Only, KEIN DB-Zugriff.
#
# Board-Direktive (VEC-397/VEC-398): KEIN Direkt-DB-Zugriff auf Twenty, KEINE
# Schema-Mutation. Twenty wurde wegen seiner API gewaehlt — die Rotation poked
# nicht mehr ins workspace-Schema (frueher: CREATE TABLE + INSERT via psql).
#
# Recherche Twenty self-hosted v2.9.0 (warum kein vollautomatischer Pfad):
#   - GraphQL-Mutation `createApiKey` existiert, ABER (a) verlangt einen bereits
#     gueltigen Access-Token (RequireAccessTokenGuard) — Henne/Ei genau im
#     Rotationsfall, wenn der Altkey tot ist (401) — und (b) gibt nur die
#     ApiKey-Entity zurueck, NICHT den nutzbaren Token. Token-Minting ist in
#     v2.9.0 ueber die GraphQL-API NICHT exponiert.
#   - CLI `workspace:generate-api-key` liefert zwar einen Token, ist aber hart
#     auf NODE_ENV development|test gegated und wirft in production.
#   => Kein produktionstauglicher headless-Token-Pfad. Token wird daher MANUELL
#      in der Twenty-UI erzeugt (Settings -> Developers -> API Keys -> Create)
#      und als Pipeline-Variable NEW_CRM_API_KEY uebergeben.
#      Runbook: docs/CRM-KEY-ROTATION.md
#
# Dieser Job macht NUR die DB-freie Mechanik:
#   1) Preflight: GL_WRITE_TOKEN + NEW_CRM_API_KEY muessen gesetzt sein.
#   2) Smoke-Test: NEW_CRM_API_KEY gegen Twenty REST (/rest/people) pruefen
#      (erwartet HTTP 200) — verhindert das Ausrollen eines toten Keys.
#   3) CI-Var CRM_API_KEY via GL_WRITE_TOKEN (PUT, masked=true) aktualisieren.
#   4) Redeploy auf main triggern (POST .../pipeline?ref=main) — deploy-auto
#      schreibt den Key aus der CI-Var frisch in die .env.
#
# Secrets-Hygiene: NEW_CRM_API_KEY wird nie geloggt (nur Laenge); per
# --data-urlencode an die GitLab-API bzw. per Container-Env in den Smoke-Test.
#
# Manuell triggerbar (web/api), needs: [] — laeuft ohne erneuten Build/Deploy.
# =============================================================================
ops-rotate-crm-api-key:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    - |
      set -e

      # ── 1) Preflight ────────────────────────────────────────────────────
      if [ -z "${GL_WRITE_TOKEN}" ]; then
        echo "FATAL: GL_WRITE_TOKEN (GitLab PAT api-Scope + Maintainer) fehlt — CI-Var-Update unmoeglich."
        echo "       GitLab: User Settings -> Access Tokens -> api-Scope -> als CI-Var GL_WRITE_TOKEN setzen."
        exit 1
      fi
      if [ -z "${NEW_CRM_API_KEY}" ]; then
        echo "FATAL: NEW_CRM_API_KEY fehlt — kein Token zum Ausrollen (KEIN DB-Zugriff/Auto-Mint mehr)."
        echo ""
        echo "  Token zuerst MANUELL in Twenty erzeugen (Twenty hat in v2.9.0 keinen"
        echo "  produktionstauglichen headless-Token-Pfad — Details: docs/CRM-KEY-ROTATION.md):"
        echo "    1. Twenty-UI im internen Netz oeffnen: Settings -> Developers -> API Keys"
        echo "    2. 'Create key' -> Name z.B. 'vectiscan-lead-router' -> Token EINMAL kopieren"
        echo "    3. Diesen Job mit Pipeline-Variable NEW_CRM_API_KEY=<token> erneut starten"
        exit 1
      fi
      echo "OK: NEW_CRM_API_KEY praesent (Laenge ${#NEW_CRM_API_KEY}, Wert wird nie geloggt)."

      # ── 2) Smoke-Test: neuen Token gegen Twenty REST pruefen ────────────
      # Aufruf aus dem api-Container (proxy-net -> twenty-server, kein Traefik/401).
      # Token via -e in den exec gereicht, nie als Arg/Log.
      echo "Smoke-Test NEW_CRM_API_KEY gegen Twenty REST /rest/people ..."
      SMOKE=$(docker compose exec -T -e TKN="${NEW_CRM_API_KEY}" api sh -c \
        'curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          -H "Authorization: Bearer ${TKN}" \
          "http://vectiscan-twenty-server-1:3000/rest/people?limit=1"' 2>/dev/null || echo "000")
      echo "  Twenty REST HTTP ${SMOKE}"
      if [ "${SMOKE}" != "200" ]; then
        echo "FATAL: NEW_CRM_API_KEY wird von Twenty NICHT akzeptiert (HTTP ${SMOKE}, erwartet 200)."
        echo "       Key in Twenty pruefen/neu erzeugen — CI-Var bleibt unveraendert (kein toter Key ausgerollt)."
        exit 1
      fi
      echo "  PASS: Token gueltig (Twenty antwortet 200)."

      # ── 3) CI-Var CRM_API_KEY aktualisieren ─────────────────────────────
      echo "Aktualisiere CI-Var CRM_API_KEY (maskiert, Wert nie geloggt) ..."
      GL_VARS_API="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/variables"
      HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "${GL_VARS_API}/CRM_API_KEY" \
        -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
        --data-urlencode "value=${NEW_CRM_API_KEY}" \
        -d "masked=true&protected=false&variable_type=env_var")
      if [ "${HTTP}" = "404" ]; then
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${GL_VARS_API}" \
          -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}" \
          --data-urlencode "key=CRM_API_KEY" \
          --data-urlencode "value=${NEW_CRM_API_KEY}" \
          -d "masked=true&protected=false&variable_type=env_var")
      fi
      echo "  CRM_API_KEY-Update: HTTP ${HTTP}"
      [ "${HTTP}" = "200" ] || [ "${HTTP}" = "201" ] || { echo "FATAL: CI-Var-Update fehlgeschlagen (HTTP ${HTTP})."; exit 1; }

      # ── 4) Redeploy triggern ────────────────────────────────────────────
      echo "Triggere Redeploy (main-Pipeline) ..."
      PIPE_HTTP=$(curl -s -o /tmp/pipe.json -w "%{http_code}" -X POST \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/pipeline?ref=main" \
        -H "PRIVATE-TOKEN: ${GL_WRITE_TOKEN}")
      echo "  Pipeline-Trigger: HTTP ${PIPE_HTTP}"
      if [ "${PIPE_HTTP}" = "200" ] || [ "${PIPE_HTTP}" = "201" ]; then
        PIPE_ID=$(sed -n 's/.*"id":\([0-9]*\).*/\1/p' /tmp/pipe.json | head -1)
        echo "  Neue Pipeline: ${PIPE_ID} (deploy-auto schreibt den rotierten Key in die .env)."
      else
        echo "WARN: Redeploy-Trigger fehlgeschlagen (HTTP ${PIPE_HTTP}). CI-Var ist bereits rotiert —"
        echo "      einen main-Deploy manuell ausloesen, dann ops-e2e-vec387 verifizieren."
      fi

      echo "=== CRM-API-Key-Rotation abgeschlossen (API-Only, kein DB-Zugriff) ==="
      echo "  Naechster Schritt: nach Deploy ops-e2e-vec387 -> erwartet crm=created|exists."
