# =============================================================================
# VectiScan CI/CD Pipeline
# =============================================================================
# Multi-image build pipeline for the VectiScan security scanning platform.
# Builds four services, scans with Trivy, runs tests, and deploys via
# docker compose on vectigal-docker02.
# =============================================================================

variables:
  REGISTRY: ghcr.io
  BASE_IMAGE: ${REGISTRY}/dc-77/vectiscan
  APP_NAME: vectiscan
  DEPLOY_PATH: /opt/apps/${APP_NAME}
  # VEC-190: Cloudflare Turnstile Site Key (oeffentlich — kein Secret)
  # Wird via --build-arg in den Frontend-Build inlinent (commit 1bc3b74).
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADfzZnijCBUdqMMD"

stages:
  - build
  - scan
  - test
  - deploy
  - ops

# =============================================================================
# BUILD STAGE — Build & push Docker images for all four services
# =============================================================================

.build-base:
  stage: build
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    # VEC-190: NEXT_PUBLIC_TURNSTILE_SITE_KEY (öffentlicher Site-Key) zur Build-Zeit
    # durchreichen. Nur das frontend-Image deklariert die ARG; für die anderen
    # Services ist der --build-arg ein harmloser, ungenutzter Hinweis (kein Fehler).
    # VEC-220: SHA-Tag immer bauen+pushen (deploy-auto/-manual pinnen darauf).
    - docker build --no-cache --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}" -t ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA} ${SERVICE}/
    - docker push ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
    # VEC-220 (DoD-2): den mutable :latest-Tag NUR von main aktualisieren, damit
    # develop-/web-Builds ihn nicht mehr ueberschreiben. :latest spiegelt damit
    # immer den letzten Prod-(main-)Stand; lokale `docker compose up`-Fallbacks
    # (${TAG:-latest}) ziehen keinen ungeprueften Branch-Code mehr.
    - |
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        docker tag ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA} ${BASE_IMAGE}/${SERVICE}:latest
        docker push ${BASE_IMAGE}/${SERVICE}:latest
        echo "OK: :latest aktualisiert (main)."
      else
        echo "SKIP: :latest-Push auf Branch '${CI_COMMIT_BRANCH}' uebersprungen (nur main aktualisiert den mutable Tag)."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

build-frontend:
  extends: .build-base
  variables:
    SERVICE: frontend

build-api:
  extends: .build-base
  variables:
    SERVICE: api

build-scan-worker:
  extends: .build-base
  variables:
    SERVICE: scan-worker

build-report-worker:
  extends: .build-base
  variables:
    SERVICE: report-worker

# =============================================================================
# SCAN STAGE — Trivy vulnerability scan for each image (CRITICAL only)
# =============================================================================

.trivy-base:
  stage: scan
  tags: [vectigal]
  script:
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

trivy-frontend:
  extends: .trivy-base
  variables:
    SERVICE: frontend

trivy-api:
  extends: .trivy-base
  variables:
    SERVICE: api

trivy-scan-worker:
  extends: .trivy-base
  variables:
    SERVICE: scan-worker
  rules:
    - when: never

trivy-report-worker:
  extends: .trivy-base
  variables:
    SERVICE: report-worker

# =============================================================================
# TEST STAGE — Unit tests for API and both workers
# =============================================================================

test-api:
  stage: test
  tags: [vectigal]
  image: node:20-alpine
  script:
    - cd api && npm ci && npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-scan-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd scan-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt -r requirements-dev.txt && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-report-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd report-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt pytest && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

# VEC-160 / VEC-143 / VEC-269 / VEC-439: Edge admin-guard regression gate (SICHERHEITSKRITISCH).
# Fails the pipeline if a public Traefik router gains a Host() that is not also
# covered by the /admin guard router (oauth2-proxy-redirect@file since VEC-439 C3) — i.e. an
# unguarded admin surface. Scoped to the self-contained test only (NOT all of
# tests/, which still has unrelated staleness to reconcile separately).
test-edge:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    # Runner ist Shell-Executor (image: wird ignoriert); System-Python ist PEP-668
    # externally-managed → venv wie bei test-scan-worker/test-report-worker.
    - python3 -m venv .venv && . .venv/bin/activate && pip install pyyaml pytest && pytest tests/test_edge_admin_guard.py -v
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# DEPLOY STAGE — Rolling deploy, manual deploy, and rollback
# =============================================================================

.deploy-base:
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    - cd ${DEPLOY_PATH}
    # ── Pre-Deploy: aktive Scans verhindern damit der Container-Restart
    #    keinen Mid-Phase2-Scan abwuergt (Daten waeren verloren, weil noch
    #    nicht in MinIO hochgeladen). Bei DEPLOY_FORCE=true wird die Pruefung
    #    uebersprungen — fuer Notfall-Hotfixes.
    - |
      if [ "${DEPLOY_FORCE:-false}" != "true" ]; then
        ACTIVE=$(docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -tAc "
          SELECT count(*) FROM orders WHERE status IN
            ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')
        " 2>/dev/null | tr -d '[:space:]' || echo "?")
        if [ "$ACTIVE" = "?" ]; then
          echo "WARN: Konnte aktive Scans nicht pruefen (DB nicht erreichbar?). Fahre vorsichtig fort."
        elif [ "$ACTIVE" -gt 0 ]; then
          echo "ERROR: $ACTIVE aktive Scan(s) laufen — Deploy abgebrochen."
          echo "       Warte bis sie fertig sind, oder setze DEPLOY_FORCE=true (Daten gehen verloren!)."
          docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -c "
            SELECT id, target_url, status, scan_started_at FROM orders WHERE status IN
              ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')
            ORDER BY scan_started_at DESC LIMIT 10
          " 2>/dev/null || true
          exit 1
        else
          echo "OK: keine aktiven Scans, Deploy darf weiterlaufen."
        fi
      else
        echo "WARN: DEPLOY_FORCE=true — aktive Scans werden ignoriert."
      fi
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp .env .env.bak 2>/dev/null || true
    # VEC-140 Go-live-Guard: Lead-Capture haengt am Mail-Versand. Eine leere
    # RESEND_API_KEY-Variable (z.B. protected Var auf unprotected Branch) wuerde
    # Mail-Routing STILL deaktivieren. Lieber laut abbrechen als still ausfallen.
    # Log zeigt nur die Laenge, nie den Wert (Secrets-Hygiene).
    - |
      if [ -z "${RESEND_API_KEY}" ]; then
        echo "ERROR: RESEND_API_KEY ist leer — CI-Variable nicht injiziert. Bei protected Var auf unprotected 'main' liefert GitLab keinen Wert. Deploy abgebrochen."
        exit 1
      fi
      echo "OK: RESEND_API_KEY praesent (Laenge ${#RESEND_API_KEY})."
    - |
      cat > .env <<ENVEOF
      DB_NAME=${DB_NAME}
      DB_USER=${DB_USER}
      DB_PASSWORD=${DB_PASSWORD}
      MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      JWT_SECRET=${JWT_SECRET}
      ADMIN_EMAIL=${ADMIN_EMAIL}
      ADMIN_PASSWORD=${ADMIN_PASSWORD}
      ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      RESEND_API_KEY=${RESEND_API_KEY}
      RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      SALES_LEAD_EMAIL=${SALES_LEAD_EMAIL:-support@vectiscan.de,kontakt@vectigal.ai}
      STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PERIMETER=${STRIPE_PRICE_PERIMETER:-price_1TewEA1j7RvmOvLYHNA2lyM2}
      STRIPE_PRICE_DEFAULT=${STRIPE_PRICE_DEFAULT}
      CRM_WEBHOOK_URL=http://vectiscan-twenty-server-1:3000/rest/people
      CRM_API_KEY=${CRM_API_KEY:-}
      SALES_NOTIFY_URL=${SALES_NOTIFY_URL:-}
      TWENTY_PG_PASSWORD=${TWENTY_PG_PASSWORD:-}
      TWENTY_APP_SECRET=${TWENTY_APP_SECRET:-}
      KC_DB_PASSWORD=${KC_DB_PASSWORD:-}
      KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD:-}
      KEYCLOAK_GRAFANA_SECRET=${KEYCLOAK_GRAFANA_SECRET:-}
      ENVEOF
    - sed -i 's/^[[:space:]]*//' .env
    # ── Deploy-Guard (VEC-217): RESEND_API_KEY ist eine *protected* CI-Var; auf
    #    einem unprotected Branch erreicht sie den .env-Write nicht und landet
    #    leer im Container -> E-Mail-/Lead-Routing ist STILL tot (Root-Cause
    #    VEC-216). Nicht hart failen (E-Mail ist nicht scan-blocking), aber laut
    #    sichtbar machen. Nur Praesenz wird geprueft, der Wert nie geloggt.
    - |
      if grep -q '^RESEND_API_KEY=$' .env; then
        echo "WARN: RESEND_API_KEY ist LEER im .env — E-Mail-/Lead-Routing ist TOT."
        echo "      Ursache i.d.R.: protected CI-Var trifft unprotected Branch (VEC-216)."
        echo "      Scan-Funktion bleibt unberuehrt; nur Lead-/Mail-Versand betroffen."
      else
        echo "OK: RESEND_API_KEY im .env gesetzt (Wert wird nicht geloggt)."
      fi
    # ── Deploy-Guard (VEC-247): Stripe-Kauf (VEC-223). STRIPE_PRICE_PERIMETER
    #    hat einen committeten, nicht-geheimen Test-Mode-Default und ist daher
    #    immer gesetzt; eine CI-Var (z.B. Live-Price via VEC-14) ueberschreibt
    #    ihn. STRIPE_SECRET_KEY ist das eigentliche Gate: ohne ihn antwortet
    #    /api/subscriptions mit 503 (payment_not_configured). Nur Praesenz
    #    pruefen, Werte nie loggen. Nicht hart failen (Kauf ist nicht
    #    scan-blocking), aber laut sichtbar machen.
    - |
      if grep -q '^STRIPE_SECRET_KEY=$' .env; then
        echo "WARN: STRIPE_SECRET_KEY ist LEER im .env — Perimeter-Kauf ist TOT (503 payment_not_configured)."
        echo "      Ursache i.d.R.: CI-Var nicht gebunden (Maintainer) oder protected-Var auf unprotected Branch."
        echo "      Scan-Funktion bleibt unberuehrt; nur der Abo-/Kauf-Flow betroffen."
      else
        echo "OK: STRIPE_SECRET_KEY im .env gesetzt (Wert wird nicht geloggt)."
      fi
    - |
      if grep -q '^STRIPE_PRICE_PERIMETER=$' .env; then
        echo "WARN: STRIPE_PRICE_PERIMETER ist LEER — /api/subscriptions antwortet 503 price_not_configured."
      else
        echo "OK: STRIPE_PRICE_PERIMETER im .env gesetzt (price-id ist nicht geheim)."
      fi
    # ── Deploy-Guard (VEC-238 / Folge VEC-229): ADMIN_EMAIL speist ALERT_EMAIL_TO
    #    (docker-compose.yml:619), den Empfaenger des Grafana-Contactpoints
    #    ops-email. Ist ADMIN_EMAIL leer, feuert die report.notify_failed-Alert-
    #    Regel (VEC-228/229) ins Leere -> Observability nur kosmetisch. db.ts:489
    #    nutzt ADMIN_EMAIL nur conditional, ein leerer Wert crasht die App nicht;
    #    die Praesenz ist also nicht aus "App laeuft" ableitbar. Nicht hart failen
    #    (nicht scan-blocking), aber laut. Nur Praesenz pruefen, Wert nie loggen.
    - |
      if grep -q '^ADMIN_EMAIL=$' .env; then
        echo "WARN: ADMIN_EMAIL ist LEER im .env — Grafana-Alert (VEC-229) hat KEINEN Empfaenger (ALERT_EMAIL_TO leer). report.notify_failed-Alert feuert ins Leere."
        echo "      Ursache i.d.R.: CI-Var ADMIN_EMAIL leer/unset. Abhilfe: CI-Var setzen (Board)."
        echo "      Scan-Funktion bleibt unberuehrt; nur die Alert-Zustellung betroffen."
      else
        echo "OK: ADMIN_EMAIL im .env gesetzt -> Grafana-Alert-Empfaenger vorhanden (Wert wird NICHT geloggt)."
      fi
    # ── Deploy-Guard (VEC-328): CRM_API_KEY ist der Bearer-Token fuer den Twenty-CRM-Upsert.
    #    Ohne ihn antwortet /rest/people mit 403 (FORBIDDEN_EXCEPTION) → crm-lookup-failed.
    #    CRM_WEBHOOK_URL ist jetzt hardcoded auf den internen Container-URL (bypasses Traefik).
    - |
      if grep -q '^CRM_API_KEY=$' .env; then
        echo "WARN: CRM_API_KEY ist LEER im .env — CRM-Lead-Upsert ist TOT (403 from Twenty)."
        echo "      Ursache i.d.R.: CI-Var CRM_API_KEY leer/unset. Abhilfe: CI-Var setzen (Maintainer)."
        echo "      DOI-Confirm-Flow bleibt unberuehrt; nur CRM-Sync betroffen."
      else
        echo "OK: CRM_API_KEY im .env gesetzt (Wert wird nicht geloggt). CRM_WEBHOOK_URL=intern."
      fi
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    # Monitoring-Configs (VEC-85): Bind-Mounts in docker-compose.yml zeigen auf
    # ./monitoring — daher die Configs neben docker-compose.yml mit ausrollen.
    - rm -rf ./monitoring && cp -r ${CI_PROJECT_DIR}/monitoring .
    # ── VEC-268 Sende-Domain-Cutover: RESEND_FROM_EMAIL deterministisch auf
    #    vectiscan.de zwingen. Eine *bestehende* (maskierte) CI-Var
    #    RESEND_FROM_EMAIL mit dem ALTEN Wert (noreply@vectigal.tech) wuerde
    #    sonst gewinnen: `docker compose` interpoliert ${RESEND_FROM_EMAIL}
    #    bevorzugt aus der Shell-Env (CI-Vars sind exportiert) VOR der .env-Datei,
    #    und ueberschreibt damit auch den docker-compose.yml-Default. Der explizite
    #    Export hier macht den Cutover unabhaengig vom CI-Var-Zustand. Der Wert
    #    enthaelt Leerzeichen -> nicht maskierbar -> in ops-diag-leadmail im
    #    Klartext verifizierbar. Sobald die Board/Maintainer die alte CI-Var auf
    #    diesen Wert korrigiert (oder loescht), kann dieser Override entfallen.
    - export RESEND_FROM_EMAIL='VectiScan <noreply@vectiscan.de>'
    # ── VEC-388 CRM-URL-Override: Root-Cause aus VEC-387 — die CI-Variable
    #    CRM_WEBHOOK_URL traegt noch den Traefik-Public-URL (crm.vectigal.tech,
    #    gesetzt in VEC-304). Sie ist als Shell-Env exportiert und gewinnt bei
    #    `docker compose up` VOR der .env-Datei (Zeile 237) UND vor dem
    #    docker-compose.yml-Interpolations-Default (${CRM_WEBHOOK_URL:-}). Die
    #    .env-Hardcodierung aus VEC-386 war dadurch inert. Identisches
    #    Precedence-Muster wie RESEND_FROM_EMAIL oben; gleiche Loesung: expliziter
    #    Export macht den internen Container-URL deterministisch, unabhaengig vom
    #    CI-Var-Zustand (Twenty bypasst Traefik via proxy-net, kein 401). Sobald
    #    Maintainer die CI-Var loescht/auf intern korrigiert, kann der Override weg.
    - export CRM_WEBHOOK_URL='http://vectiscan-twenty-server-1:3000/rest/people'
    - docker compose pull
    # VEC-320: COMPOSE_PROFILES=crm stellt sicher dass Twenty-CRM-Container
    # bei jedem Deploy mitgestartet werden (nicht nur beim ersten manuellen Start).
    - COMPOSE_PROFILES=crm TAG=${TAG} docker compose up -d --remove-orphans
    # Give all containers time to pass health checks
    - sleep 30
    - docker compose ps
    - docker compose ps --format json | python3 -c "import sys,json; containers=[json.loads(line) for line in sys.stdin if line.strip()]; unhealthy=[c['Name'] for c in containers if c.get('Health','') not in ('','healthy') or c.get('State')!='running']; print('Unhealthy:',unhealthy) if unhealthy else print('All healthy'); exit(1 if unhealthy else 0)"
  after_script:
    - docker image prune -a -f --filter "until=1h"
    - docker builder prune -a -f
  environment:
    name: production
    url: https://scan.vectigal.tech

deploy-auto:
  extends: .deploy-base
  stage: deploy
  variables:
    # VEC-220: immutable, commit-gepinnter Tag statt mutable :latest.
    # Frueher rollte `TAG: latest` aus, was ZULETZT auf :latest gepusht wurde —
    # bei verschraenkten main/develop-Pipelines (Single-Runner) konnte das ein
    # FREMDES (z.B. develop-) Image sein (Deployment-Integritaets-Race).
    # `deploy-manual` pinnt bereits auf SHA — analog hier. Jeder Commit = eigener
    # Tag => race-immun gegen parallele Branch-Pushes.
    TAG: ${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-manual:
  extends: .deploy-base
  stage: deploy
  variables:
    TAG: ${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# =============================================================================
# OPS STAGE — manuelle Operations-Jobs
# =============================================================================
# Liegt nach `deploy` in einer eigenen Stage, damit die Pipeline regulaer als
# "passed" durchlaeuft (kein "blocked"-Status durch wartende manuelle Jobs).
# Alle Jobs hier sind `when: manual` + `allow_failure: true` — werden nie
# automatisch ausgefuehrt und blockieren den Pipeline-Status nicht.
# =============================================================================

.ops-base:
  stage: ops
  tags: [vectigal]
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Demo-Seed (VEC-121 / PA-6) — seedet den synthetischen Demo-Mandanten
# (demo@vectiscan.tech) im laufenden api-Container. Idempotent: raeumt
# vorhandene Demo-Daten (feste UUIDs) auf und legt sie neu an, streng auf
# DEMO_CUSTOMER_ID begrenzt (Tenant-Isolation).
#
# DEMO_PASSWORD-Quelle (Prioritaet):
#   1) maskierte CI/CD-Variable DEMO_PASSWORD (bevorzugt — sobald ein
#      Maintainer sie setzt; erscheint dann als [MASKED] im Job-Log)
#   2) host-persistiertes Zufalls-Secret ${DEPLOY_PATH}/.demo_password
#      (immer frisch rotiert wenn (1) fehlt — VEC-258-Fix: kein Reuse eines
#      potenziell kompromittierten Altwertes). Aktueller Wert bleibt auf dem
#      Host fuer Operatoren lesbar (chmod 600).
# In KEINEM Fall der dokumentierte Source-Default (Sven-Auflage, VEC-121).
# Der Developer-Token kann keine maskierte CI/CD-Variable setzen (Maintainer-
# only); Pfad (2) macht den Seed daher ohne Maintainer-Eingriff lauffaehig.
# `needs: []` erlaubt das manuelle Ausloesen ohne erneuten Build/Deploy —
# das Seed-Skript liegt bereits im laufenden api-Container.
# =============================================================================
ops-seed-demo:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    - |
      if [ -z "${DEMO_PASSWORD}" ]; then
        SECRET_FILE="${DEPLOY_PATH}/.demo_password"
        ( umask 077; printf 'Demo-%s-2026!' "$(openssl rand -hex 6)" > "${SECRET_FILE}" )
        chmod 600 "${SECRET_FILE}"
        echo "Demo-Secret rotiert: ${SECRET_FILE} (chmod 600) — DEMO_PASSWORD CI/CD-Var nicht gesetzt."
        DEMO_PASSWORD="$(cat "${SECRET_FILE}")"
        export DEMO_PASSWORD
      fi
      if [ -z "${DEMO_PASSWORD}" ]; then
        echo "ERROR: DEMO_PASSWORD konnte weder aus CI/CD-Variable noch aus Host-Secret ermittelt werden — Abbruch."
        echo "       In prod darf kein Source-Default verwendet werden (Sven, VEC-121)."
        exit 1
      fi
      # VEC-260: Selbstheilung gegen den oeffentlich dokumentierten Quell-Default.
      # Greift quellen-unabhaengig (CI-Var ODER Host-Secret): ist der aufgeloeste
      # Wert das bekannte Default, rotiere das Host-Secret und nutze den frischen
      # Zufallswert. Verhindert die VEC-260-Regression (Re-Seed schrieb still das
      # bekannte Default, weil eine vorhandene Quelle genau diesen Wert lieferte).
      if [ "${DEMO_PASSWORD}" = "VectiScanDemo2026!" ]; then
        echo "WARN: aufgeloestes DEMO_PASSWORD == Quell-Default — rotiere Host-Secret auf Zufallswert (VEC-260)."
        SECRET_FILE="${DEPLOY_PATH}/.demo_password"
        ( umask 077; printf 'Demo-%s-2026!' "$(openssl rand -hex 6)" > "${SECRET_FILE}" )
        chmod 600 "${SECRET_FILE}"
        DEMO_PASSWORD="$(cat "${SECRET_FILE}")"
        export DEMO_PASSWORD
      fi
    - echo "Seede Demo-Mandant (demo@vectiscan.tech) im api-Container..."
    - docker compose exec -T -e DEMO_PASSWORD="${DEMO_PASSWORD}" api node dist/scripts/seed-demo.js
    # Single-quoted: ohne Quoting parst YAML 'echo "OK: ...' wegen des ': '
    # als Map statt String (CI-Config-Error, VEC-121-Regression).
    - 'echo "OK: Demo-Seed abgeschlossen."'

# =============================================================================
# Ops-Diag Lead-Mail (VEC-217) — Read-only Diagnose fuer RESEND/E-Mail-Routing.
# Reproduziert die VEC-216-Diagnose in Sekunden: meldet Praesenz + LAENGE von
# RESEND_API_KEY im laufenden api-Container (NIE den Wert) sowie
# RESEND_FROM_EMAIL und greppt die api-Logs nach Lead-/RESEND-Spuren.
# Komplett read-only — keine Mutation, kein Restart. `needs: []` -> ohne
# Build/Deploy manuell triggerbar.
# =============================================================================
ops-diag-leadmail:
  extends: .ops-base
  needs: []
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== RESEND-Env im laufenden api-Container (read-only, Wert wird NIE geloggt) ==="
    - |
      docker compose exec -T api sh -c '
        klen=${#RESEND_API_KEY}
        if [ "${klen:-0}" -gt 0 ]; then
          echo "  RESEND_API_KEY: gesetzt (Laenge=${klen})"
        else
          echo "  RESEND_API_KEY: LEER/FEHLT — E-Mail-/Lead-Routing ist tot (VEC-216)"
        fi
        echo "  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-(leer)}"
      ' || echo "(api-Container nicht erreichbar?)"
    - echo
    - 'echo "=== api-Logs (letzte 5000 Zeilen): Lead-/RESEND-Spuren ==="'
    - docker logs --tail 5000 vectiscan-api-1 2>&1 | grep -iE 'Demo-lead|RESEND' | tail -50 || echo "(keine Lead-/RESEND-Logzeilen gefunden)"

# =============================================================================
# Diag-ACME (VEC-269) — read-only ACME/LE-Diagnose fuer vectiscan.de + www.
# Liest Traefik-Logs (acme/certificate/challenge) + acme.json-DOMAINS (kein
# Key-Material) + Static-Config-Resolver. Keine Mutation, kein Restart.
# needs:[] -> sofort manuell spielbar ohne Build/Deploy.
# =============================================================================
ops-diag-acme:
  extends: .ops-base
  needs: []
  script:
    - TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1); echo "traefik-container=$TRAEFIK"
    - 'echo "=== Traefik-Logs ACME/cert/challenge/vectiscan.de (letzte Treffer) ==="'
    - docker logs --tail 12000 "$TRAEFIK" 2>&1 | grep -iE 'acme|certificate|challenge|vectiscan\.de|unable to obtain|rate limit|too many|letsencrypt|error' | tail -150 || echo "(keine ACME-Logzeilen gefunden)"
    - echo
    - 'echo "=== acme.json Domainnamen (main), KEIN Key-Material ==="'
    - |
      docker exec "$TRAEFIK" sh -c 'for f in /acme.json /etc/traefik/acme.json /opt/traefik/acme/acme.json /data/acme.json /letsencrypt/acme.json; do if [ -f "$f" ]; then echo "FOUND $f"; grep -oE "\"main\":\"[^\"]+\"" "$f" | sort -u | head -80; fi; done' || echo "(acme.json nicht im Container gefunden)"
    - echo
    - 'echo "=== Static-Config Resolver/Entrypoints/Challenge ==="'
    - |
      docker exec "$TRAEFIK" sh -c 'for f in /etc/traefik/traefik.yml /traefik.yml /etc/traefik/traefik.toml /config/traefik.yml; do [ -f "$f" ] && echo "--- $f ---" && cat "$f"; done' 2>/dev/null | grep -iE 'acme|entrypoint|httpchallenge|tlschallenge|email|caserver|resolver|address|:80|:443|web|websecure' | head -60 || echo "(static config nicht lesbar)"

# =============================================================================
# Restart-Worker — gezieltes Restart einzelner Worker-Container ohne
# einen vollen Cleanup. Nutzt Pipeline-Variable `WORKER` (Default report-worker).
# =============================================================================
ops-restart-worker:
  extends: .ops-base
  variables:
    WORKER: report-worker
  script:
    - cd ${DEPLOY_PATH}
    - echo "Restarting ${WORKER}..."
    - docker compose restart ${WORKER}
    - sleep 5
    - docker compose ps ${WORKER}
    - echo
    - echo "=== Letzte 30 Log-Zeilen nach Restart ==="
    - docker compose logs --tail=30 --no-color ${WORKER} 2>&1 | tail -30 || true

# =============================================================================
# Services-Status — Container-Status + BullMQ-Queue-Tiefen + Worker-Logs.
# Nur Lesezugriff, kein restart. Ideal um zu sehen warum ein Job haengt.
# =============================================================================
ops-services-status:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== docker compose ps ==="
    - docker compose ps --format 'table {{.Name}}\t{{.State}}\t{{.Status}}' || true
    - echo
    - echo "=== Redis BullMQ Queue-Tiefen ==="
    # `|| true` damit der Job nicht abbricht wenn ein Test-Step false-y ist
    # (passiert z.B. wenn alle bull-prefix-LLENs 0 sind → letzter Test
    # falsy → set -e killt das Skript bevor die nachfolgenden Echos kommen).
    - |
      docker compose exec -T redis sh -c '
        set +e
        for q in precheck-pending scan-pending report-pending; do
          len=$(redis-cli LLEN "$q" 2>/dev/null)
          printf "  %-22s %s\n" "$q" "${len:-?}"
        done
        echo
        echo "  bull-namespaced (waiting/active/completed/failed):"
        for prefix in bull:scan-pending bull:report-pending bull:precheck-pending; do
          for s in waiting active completed failed delayed; do
            len=$(redis-cli LLEN "${prefix}:${s}" 2>/dev/null)
            if [ -n "$len" ] && [ "$len" != "0" ]; then
              printf "    %-40s %s\n" "${prefix}:${s}" "$len"
            fi
          done
        done
        exit 0
      ' || true
    - echo
    - echo "=== report-worker Logs (letzte 200 Zeilen) ==="
    - docker compose logs --tail=200 --no-color report-worker 2>&1 | tail -200 || true
    - echo
    - echo "=== scan-worker-1 Logs (letzte 30 Zeilen) ==="
    - docker compose logs --tail=30 --no-color scan-worker-1 2>&1 | tail -30 || true

# =============================================================================
# Findings-Audit (Read-Only) — Bewertung der Determinismus-Pipeline
# =============================================================================
# Liefert eine Übersicht ueber Reports + Findings: severity-Verteilung,
# policy_id-Coverage, SP-FALLBACK-Rate, ai_cache-Hit-Statistik, etc.
# Komplett read-only — kein DDL, keine Mutation. Logs ueber GitLab-API
# auswertbar.
ops-findings-audit:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - |
      docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -A -X <<'SQL'
      \echo === ORDERS ===
      SELECT status, count(*) FROM orders GROUP BY status ORDER BY 1;

      \echo === REPORTS (count + policy_version) ===
      SELECT policy_version, count(*) AS reports
        FROM reports GROUP BY policy_version ORDER BY 1 NULLS LAST;

      \echo === SEVERITY VERTEILUNG (alle Reports) ===
      SELECT
        SUM((severity_counts->>'critical')::int) AS critical,
        SUM((severity_counts->>'high')::int)     AS high,
        SUM((severity_counts->>'medium')::int)   AS medium,
        SUM((severity_counts->>'low')::int)      AS low,
        SUM((severity_counts->>'info')::int)     AS info,
        count(*)                                  AS reports
      FROM reports
      WHERE severity_counts IS NOT NULL;

      \echo === SEVERITY PRO REPORT ===
      SELECT
        r.id AS report_id,
        o.target_url,
        o.package,
        r.created_at::date AS day,
        r.policy_version,
        r.severity_counts->>'critical' AS critical,
        r.severity_counts->>'high'     AS high,
        r.severity_counts->>'medium'   AS medium,
        r.severity_counts->>'low'      AS low,
        r.severity_counts->>'info'     AS info,
        coalesce(array_length(r.policy_id_distinct,1),0) AS distinct_policies,
        coalesce(jsonb_array_length(r.findings_data),0) AS findings_count
      FROM reports r
      LEFT JOIN orders o ON o.id = r.order_id
      ORDER BY r.created_at DESC
      LIMIT 20;

      \echo === SP-FALLBACK RATE ===
      SELECT
        count(*) AS total_reports,
        count(*) FILTER (WHERE 'SP-FALLBACK' = ANY(policy_id_distinct)) AS reports_with_fallback,
        ROUND(100.0 * count(*) FILTER (WHERE 'SP-FALLBACK' = ANY(policy_id_distinct))
              / NULLIF(count(*),0), 1) AS fallback_pct
      FROM reports
      WHERE policy_version IS NOT NULL;

      \echo === DISTINCT POLICY-IDs (Top 30, sortiert nach Frequenz) ===
      SELECT pid, count(*) AS hits
      FROM reports r,
           LATERAL unnest(r.policy_id_distinct) AS pid
      WHERE r.policy_version IS NOT NULL
      GROUP BY pid
      ORDER BY 2 DESC, 1 ASC
      LIMIT 30;

      \echo === FINDINGS_DATA ARRAY-LAENGE STATS ===
      SELECT
        round(avg(jsonb_array_length(findings_data->'findings'))::numeric, 1) AS avg_findings_per_report,
        min(jsonb_array_length(findings_data->'findings')) AS min_findings,
        max(jsonb_array_length(findings_data->'findings')) AS max_findings,
        count(*) AS reports
      FROM reports
      WHERE jsonb_typeof(findings_data->'findings') = 'array';

      \echo === POSITIVE FINDINGS (positive_findings JSONB-Array) ===
      SELECT
        round(avg(jsonb_array_length(findings_data->'positive_findings'))::numeric, 1)
            AS avg_positive_findings,
        count(*) FILTER (WHERE jsonb_array_length(findings_data->'positive_findings') > 0)
            AS reports_with_positive,
        count(*) AS total_reports
      FROM reports
      WHERE findings_data ? 'positive_findings';

      \echo === RAW SAMPLE: erstes finding pro neueren Report ===
      SELECT
        r.id::text AS report_id,
        o.target_url,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].title')    AS first_finding_title,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].severity') AS first_finding_severity,
        jsonb_path_query_first(r.findings_data->'findings', '$[0].policy_id') AS first_finding_policy
      FROM reports r
      LEFT JOIN orders o ON o.id = r.order_id
      WHERE r.policy_version IS NOT NULL
      ORDER BY r.created_at DESC
      LIMIT 10;
      SQL

# =============================================================================
# Baseline-Snapshot: KPI-Snapshot fuer Vor-/Nachher-Vergleich nach Audit-
# Deployment (Scan-Optimierung-Changelog.md). Liefert:
# - Orders/Reports/Subscriptions Counts
# - POLICY_VERSION-Verteilung
# - Severity-Verteilung (30d)
# - KI-Cache-Hit-Quote pro Namespace (7d) + Kosten-Aggregat
# - Determinismus-KPI (alle Subscriptions)
# - policy_id-Verteilung Top 30
# - consolidated_findings pro Paket
# - Shodan-Pre-Warm-Status (Migration 026)
# - Top finding_types
# - Takeover/URLhaus-Findings
# - Neue SP-DNS-* + SP-URLHAUS-001 Counts
#
# Komplett read-only. Output via GitLab-Job-Logs auswertbar.
#
# Nutzung: GitLab-UI → main-Pipeline → ops-baseline-snapshot manuell triggern.
# Empfohlen: Snapshot 1× vor Test-Scan-Set + 1× nach Re-Scans
# (Vorher/Nachher-Diff fuer Cache-Hit-Erhoehung etc.).
# =============================================================================
ops-baseline-snapshot:
  extends: .ops-base
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - baseline-snapshot.txt
  script:
    - cd ${DEPLOY_PATH}
    - echo "=== Baseline-Snapshot (Scan-Optimierung KPIs) ==="
    - cat ${CI_PROJECT_DIR}/scripts/ops-baseline-snapshot.sql | docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -X 2>&1 | tee ${CI_PROJECT_DIR}/baseline-snapshot.txt
    - echo "=== Snapshot saved als job artifact baseline-snapshot.txt (30d retention) ==="
    - echo "=== Download via GitLab-UI Job-Page -> Browse Artifacts ==="

# Rollback: Compose-Snapshot + .env.bak zurueckspielen + Container hochfahren.
rollback:
  extends: .ops-base
  script:
    - cd ${DEPLOY_PATH}
    - cp docker-compose.yml.bak docker-compose.yml
    - cp .env.bak .env
    - docker compose pull
    - docker compose up -d --remove-orphans
    - sleep 30
    - docker compose ps
  environment:
    name: production
    url: https://scan.vectigal.tech

# =============================================================================
# CLEANUP-PROD — Big-Bang Wipe (Q2/2026 Determinismus-Reset)
# =============================================================================
# =============================================================================
# EOL-DATA-SYNC: holt aktuelle EOL-Termine von endoflife.date und
# regeneriert report-worker/reporter/eol_data_generated.py. Push erfolgt
# durch den Job selbst (commit + push als Pipeline-Bot).
#
# Auslöser:
#   - Manuell via GitLab-UI ("Run pipeline" + Job ausführen)
#   - Schedule (CI_PIPELINE_SOURCE=schedule, weekly empfohlen):
#     GitLab → CI/CD → Schedules → "EOL-Data-Sync (weekly)" anlegen,
#     Cron z.B. "0 4 * * 1" (Mo 04:00 UTC).
#
# Sicherheitsnetz:
#   - Wenn endoflife.date down ist (entries=0): exit 1, kein Push.
#   - Bei keinen Aenderungen (`git diff --quiet`): kein Commit, kein Push.
#
# Lizenz-Hinweis: Daten von endoflife.date — CC-BY-4.0 — Attribution
# bereits im Generated-Header verzeichnet.
# =============================================================================

# YAML-Anchor: gemeinsame Defaults fuer alle Sync-Jobs (EOL-Data, kuenftig
# auch Threat-Intel/CWE-Cache). Schedule-Trigger via `SYNC_ENABLED=true`,
# manueller Trigger ueber GitLab-UI ("Run pipeline").
.sync-job-template: &sync-job-template
  stage: ops
  tags: [vectigal]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SYNC_ENABLED == "true"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true

eol-data-sync:
  <<: *sync-job-template
  # Override fuer Backwards-Compat: alte Schedules nutzen `EOL_SYNC=true`,
  # neue koennen `SYNC_ENABLED=true` verwenden. Beide funktionieren.
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && ($EOL_SYNC == "true" || $SYNC_ENABLED == "true")
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - python3 scripts/sync-eol-data.py
    - python3 scripts/_sync_commit.py report-worker/reporter/eol_data_generated.py

# F-PRE-003: Cloud-Provider-IPv4-Ranges-Sync (AWS/GCP/Cloudflare/Fastly/
# DigitalOcean + RIPEstat-ASNs fuer OVH/IONOS/STRATO/Hetzner-Online).
# Schedule-Variable `CLOUD_RANGES_SYNC=true` (oder global `SYNC_ENABLED=true`).
cloud-ranges-sync:
  <<: *sync-job-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && ($CLOUD_RANGES_SYNC == "true" || $SYNC_ENABLED == "true")
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - python3 scripts/sync-cloud-ranges.py
    - python3 scripts/_sync_commit.py scan-worker/data/cloud_ranges_generated.py

# F-P0B-006: Subdomain-Takeover-Liste-Sync via EdOverflow can-i-take-over-xyz
# (~35 vulnerable Services, Stand 2026-05). Schreibt
# scan-worker/data/takeover_data_generated.py — kombiniert mit Manual-Liste
# in `phase0._build_takeover_indicators()`.
# Schedule-Variable `TAKEOVER_SYNC=true` (oder global `SYNC_ENABLED=true`).
takeover-list-sync:
  <<: *sync-job-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && ($TAKEOVER_SYNC == "true" || $SYNC_ENABLED == "true")
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - python3 scripts/sync-takeover-list.py
    - python3 scripts/_sync_commit.py scan-worker/data/takeover_data_generated.py

# F-RPT-001: KNOWN_VULN_BUILDS-Sync via OSV-API + CISA-KEV (CVSS>=9.0 ODER
# KEV-listed). Schreibt report-worker/reporter/known_vuln_builds_generated.py
# — kombiniert mit Manual-Liste in `eol_detector.KNOWN_VULN_BUILDS_MANUAL`.
# Schedule-Variable `KNOWN_VULN_SYNC=true` (oder global `SYNC_ENABLED=true`).
known-vuln-builds-sync:
  <<: *sync-job-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && ($KNOWN_VULN_SYNC == "true" || $SYNC_ENABLED == "true")
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - python3 scripts/sync-known-vuln-builds.py
    - python3 scripts/_sync_commit.py report-worker/reporter/known_vuln_builds_generated.py

# Triggert scripts/cleanup-prod.sh auf vectigal-docker02. Wipet alle Scan-
# Daten, Reports, Subscriptions, MinIO-Objekte, Threat-Intel/AI-Caches.
# Erhalten bleiben users, customers, verified_domains, Schema.
#
# Nutzung:
#   1. Auf einer main-Pipeline in der GitLab-UI den `cleanup-prod`-Job
#      ausloesen UND die Job-Variable CLEANUP_CONFIRM=vectiscan-prod setzen
#      (Variable im "Run job"-Dialog eintragen).
#   2. Optional: CLEANUP_NO_BACKUP=true ueberspringt das pg_dump-Backup.
#   3. Ohne CLEANUP_CONFIRM bricht der Job sofort mit Hinweis ab — Schutz
#      vor versehentlichem Klick.
#
# Spec: docs/deterministic/01-cleanup.md, 99-CUTOVER.md
# =============================================================================

cleanup-prod:
  extends: .ops-base
  variables:
    # Override per Pipeline-Run via CI/CD-Variables.
    CLEANUP_CONFIRM: ""
    CLEANUP_NO_BACKUP: "false"
  script:
    - |
      if [ "$CLEANUP_CONFIRM" != "vectiscan-prod" ]; then
        echo "ERROR: Set CLEANUP_CONFIRM=vectiscan-prod in the pipeline-run form to confirm."
        echo "       (Job wurde versehentlich getriggert oder Bestaetigung fehlt.)"
        exit 1
      fi
    - cd ${DEPLOY_PATH}
    - cp -f ${CI_PROJECT_DIR}/scripts/cleanup-prod.sh ./cleanup-prod.sh
    - chmod +x ./cleanup-prod.sh
    - |
      # Bestaetigung an das Skript durchpipen + optional --no-backup
      ARGS="--confirm"
      if [ "$CLEANUP_NO_BACKUP" = "true" ]; then ARGS="$ARGS --no-backup"; fi
      CONFIRMATION_STRING=vectiscan-prod \
      PROJECT_ROOT=${DEPLOY_PATH} \
        bash -c "echo vectiscan-prod | ./cleanup-prod.sh $ARGS"
  environment:
    name: production
    url: https://scan.vectigal.tech

# =============================================================================
# VEC-439 C3 / VEC-442 C6 — SSO-Middleware-Konfig in den Traefik-File-Provider.
#
# Schreibt traefik/dynamic/vectiscan-auth.yml (oauth2-proxy forwardAuth) in den
# host-eigenen File-Provider (/opt/traefik/config, watch:true). Kein Credential-
# Platzhalter mehr — Basic-Auth (internal-auth) wurde in VEC-442 C6 entfernt.
# Manuell/API-getriggert, KEIN Image-Build/-Pull (needs:[]). Idempotent.
# =============================================================================
ops-traefik-auth:
  extends: .ops-base
  needs: []
  variables:
    TRAEFIK_CFG: /opt/traefik/config
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    # Traefik-Container ermitteln. Der File-Provider liest /etc/traefik/config
    # (= Host /opt/traefik/config, READ-ONLY im Traefik-Container). Schreiben
    # erfolgt ueber einen kurzlebigen Helfer-Container mit RW-Bind-Mount.
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      if [ -z "$TRAEFIK" ]; then echo "FATAL: kein Traefik-Container gefunden."; exit 1; fi
      echo "Traefik-Container: $TRAEFIK"
    - TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
    - HELPER=busybox:1.36
    - docker image inspect "$HELPER" >/dev/null 2>&1 || docker pull "$HELPER"
    # 1) SSO-Middleware-Konfig in den Host-File-Provider schreiben (kein Platzhalter).
    - |
      docker run --rm --user 0:0 \
        -v "${CI_PROJECT_DIR}/traefik/dynamic/vectiscan-auth.yml:/src/vectiscan-auth.yml:ro" \
        -v "${TRAEFIK_CFG}:/cfg" "$HELPER" \
        sh -c 'cp /src/vectiscan-auth.yml /cfg/vectiscan-auth.yml && chmod 644 /cfg/vectiscan-auth.yml'
    - echo "=== vectiscan-auth.yml geschrieben ==="; docker run --rm -v "${TRAEFIK_CFG}:/cfg:ro" "$HELPER" ls -la /cfg/vectiscan-auth.yml || true
    # 2) Traefik (watch:true) laedt hot — warten und Middleware-Existenz pruefen.
    - sleep 6
    - |
      NET=$(docker inspect "$TRAEFIK" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
      echo "Traefik=${TRAEFIK} Net=${NET}"
      echo "--- middleware oauth2-proxy-auth@file ---"
      docker run --rm --network "$NET" curlimages/curl:8.8.0 -s --max-time 8 "http://${TRAEFIK}:8080/api/http/middlewares/oauth2-proxy-auth@file" || echo "(middleware-check fehlgeschlagen)"
    # 3) Aktive-Scan-Guard (analog .deploy-base), dann Container neu starten.
    - cd ${DEPLOY_PATH}
    - |
      if [ "${DEPLOY_FORCE:-false}" != "true" ]; then
        ACTIVE=$(docker compose exec -T postgres psql -U "${DB_USER:-vectiscan}" -d "${DB_NAME:-vectiscan}" -tAc "SELECT count(*) FROM orders WHERE status IN ('queued','scanning','passive_intel','dns_recon','scan_phase1','scan_phase2','scan_phase3','report_generating')" 2>/dev/null | tr -d '[:space:]' || echo "?")
        if [ "$ACTIVE" != "?" ] && [ "${ACTIVE:-0}" -gt 0 ]; then
          echo "ERROR: $ACTIVE aktive Scan(s) — abgebrochen. DEPLOY_FORCE=true zum Erzwingen."; exit 1
        fi
        echo "Aktive Scans: ${ACTIVE:-0} — ok."
      fi
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    - TAG=${TAG:-latest} docker compose up -d --no-deps --no-build frontend api uptime-kuma grafana
    - sleep 10
    - docker compose ps frontend api uptime-kuma grafana
    # 4) Verifikation: Router-Middleware-Zustand pruefen.
    - |
      TRAEFIK=$(docker ps --format '{{.Names}}' | grep -i traefik | head -1)
      NET=$(docker inspect "$TRAEFIK" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
      for R in vectiscan-web-admin vectiscan-status vectiscan-logs; do
        echo "--- router ${R}@docker ---"
        docker run --rm --network "$NET" curlimages/curl:8.8.0 -s --max-time 8 "http://${TRAEFIK}:8080/api/http/routers/${R}@docker" | head -c 500; echo
      done
    # 5) SSO-Smoke: Admin+Status liefern Redirect (302) an Keycloak, nicht mehr 401.
    #    Grafana (logs) zeigt eigene Login-Seite (200). Public unveraendert (200).
    - |
      echo "=== SSO-Smoke (VEC-442 C6) ==="
      SMOKE_FAIL=0
      check_code() { # $1=url  $2=erwartet
        CODE=$(docker run --rm curlimages/curl:8.8.0 -s -o /dev/null -w '%{http_code}' --max-time 12 "$1" 2>/dev/null || echo "ERR")
        if [ "$CODE" = "$2" ]; then echo "PASS  $1 -> $CODE"; else echo "FAIL  $1 -> $CODE (erwartet $2)"; SMOKE_FAIL=1; fi
      }
      # SSO-Surfaces: oauth2-proxy -> Keycloak-Redirect (302), Grafana -> eigene Login (200/302)
      check_code "https://scan.vectigal.tech/admin"   302
      check_code "https://status.vectigal.tech/"      302
      check_code "https://logs.vectigal.tech/"        200
      # API admin: App-JWT (401 JSON), kein Traefik-Gate
      check_code "https://scan-api.vectigal.tech/api/admin/review/queue" 401
      # Oeffentlich: unveraendert
      check_code "https://scan.vectigal.tech/"        200
      if [ "$SMOKE_FAIL" = "1" ]; then
        echo "SSO-SMOKE: FAIL — Pruefen/Revert."
      else
        echo "SSO-SMOKE: ALLE PASS."
      fi
    - echo "=== FERTIG ==="
  environment:
    name: production
    url: https://scan.vectigal.tech

# =============================================================================
# VEC-437 (C1) — Keycloak-SSO provisionieren (dedizierte Instanz, Parent VEC-421).
#
# Rendert die Realm-Import-Datei (Client-Secrets aus maskierten CI-Vars statt
# Repo-Platzhalter), legt sie nach ${DEPLOY_PATH}/keycloak/import/ und startet
# das Compose-Profil `sso` (keycloak-db + keycloak). Default-Deploys lassen das
# sso-Profil aus -> dieser Job ist der EINZIGE Aktivierungspfad. Idempotent:
# Realm-Import-Strategie IGNORE_EXISTING ueberschreibt einen bestehenden Realm nicht.
# KEIN Image-Build/-Pull-Zwang (needs:[]); manuell/API-getriggert.
#
# Benoetigte maskierte Pipeline-Variablen (Owner: Hamilton/Maintainer; Dev-Token
# kann sie NICHT setzen):
#   KC_DB_PASSWORD                 Postgres-Passwort der Keycloak-DB
#   KC_BOOTSTRAP_ADMIN_PASSWORD    Master-Admin-Passwort (Erststart)
#   KEYCLOAK_GRAFANA_SECRET        Client-Secret vectiscan-grafana
#   KEYCLOAK_OAUTH2_PROXY_SECRET   Client-Secret vectiscan-oauth2-proxy
#   KC_BOOTSTRAP_ADMIN_USERNAME    (optional, Default `admin`)
# Details + Verifikation: docs/AUTH-SSO-C1-KEYCLOAK.md
# =============================================================================
ops-keycloak-healthcheck:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - cd ${DEPLOY_PATH}
    - docker compose ps keycloak-db keycloak
    - echo "=== Keycloak Logs (last 50 lines) ==="
    - docker logs vectiscan-keycloak-1 --tail 50 2>&1 || echo "Container nicht gefunden"
    - echo "=== OIDC-Discovery (extern) ==="
    - |
      CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "https://id.vectigal.tech/realms/vectiscan/.well-known/openid-configuration" 2>/dev/null || echo ERR)
      echo "OIDC -> $CODE"

ops-keycloak-provision:
  extends: .ops-base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
      allow_failure: true
  script:
    - |
      MISS=""
      for V in KC_DB_PASSWORD KC_BOOTSTRAP_ADMIN_PASSWORD KEYCLOAK_GRAFANA_SECRET KEYCLOAK_OAUTH2_PROXY_SECRET OAUTH2_PROXY_COOKIE_SECRET; do
        eval "VAL=\${$V}"
        if [ -z "$VAL" ]; then MISS="$MISS $V"; fi
      done
      if [ -n "$MISS" ]; then
        echo "FATAL: maskierte Pipeline-Variable(n) fehlen:$MISS"
        echo "       Maintainer muss sie als masked CI/CD-Variablen setzen (s. docs/AUTH-SSO-C1-KEYCLOAK.md / docs/AUTH-SSO-C3-OAUTH2-PROXY.md)."
        echo "       OAUTH2_PROXY_COOKIE_SECRET erzeugen: openssl rand -base64 32 | tr -- '+/' '-_'"
        exit 1
      fi
      echo "OK: alle 5 SSO-Secrets praesent (Werte werden nie geloggt)."
    - cd ${DEPLOY_PATH}
    # 1) Aktuelles Compose ausrollen (enthaelt die keycloak/keycloak-db-Services).
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    # 2) Realm-Import rendern: Platzhalter -> echte Secrets. python3 statt sed
    #    (robust gegen Sonderzeichen in Secrets). Ziel chmod 600 (enthaelt Secrets).
    - mkdir -p ${DEPLOY_PATH}/keycloak/import
    # python3 -c (kein Heredoc -> kein YAML-Indent-Footgun). Secrets via Env,
    # nie als Argv (taucht sonst in ps/Logs auf). Assert bricht ab, falls ein
    # Platzhalter uebrig bleibt (z.B. Tippfehler im Var-Namen).
    - |
      SRC=${CI_PROJECT_DIR}/keycloak/import/vectiscan-realm.json \
      DST=${DEPLOY_PATH}/keycloak/import/vectiscan-realm.json \
      python3 -c 'import os; d=open(os.environ["SRC"]).read(); d=d.replace("__KEYCLOAK_GRAFANA_SECRET__",os.environ["KEYCLOAK_GRAFANA_SECRET"]).replace("__KEYCLOAK_OAUTH2_PROXY_SECRET__",os.environ["KEYCLOAK_OAUTH2_PROXY_SECRET"]); assert "__KEYCLOAK_" not in d, "Platzhalter nicht ersetzt"; open(os.environ["DST"],"w").write(d); print("Realm-Import gerendert ->", os.environ["DST"])'
    # chmod 644 (nicht 600): kcadm.sh laeuft als UID 1000 im Container; 600+root
    # = AccessDeniedException (Java "File not found"). 644 ist hier korrekt:
    # docker02 ist internes DMZ-System, der Bind-Mount ist :ro im Container.
    # Cleanup nach Import (Schritt 5) entfernt die Datei mit den Client-Secrets.
    - chmod 644 ${DEPLOY_PATH}/keycloak/import/vectiscan-realm.json
    - echo "=== Import-Datei (kein Secret-Echo) ==="; ls -la ${DEPLOY_PATH}/keycloak/import/
    # 3) sso-Profil starten (zusaetzlich zu crm). --import-realm entfernt (Keycloak 26
    #    schema-strict: Realm-Import via kcadm.sh nach dem Start, nicht beim Start).
    - COMPOSE_PROFILES=crm,sso TAG=${TAG:-latest} docker compose up -d --no-build keycloak-db keycloak
    # 4) Auf Keycloak-Start warten (bis 3 Min, /health/ready). Keycloak 26 braucht
    #    60-120s fuer Quarkus-Augmentation (--optimized=false) + JGroups-Timeout.
    - |
      echo "=== Warte auf Keycloak /health/ready (bis 3 Min) ==="
      for i in $(seq 1 18); do
        STATUS=$(docker exec vectiscan-keycloak-1 curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/ready 2>/dev/null || echo ERR)
        echo "Attempt $i: $STATUS"
        if [ "$STATUS" = "200" ]; then echo "Keycloak UP!"; break; fi
        sleep 10
      done
    - docker compose ps keycloak-db keycloak
    # 5) Realm via kcadm.sh importieren (gibt im Fehlerfall den echten Grund aus).
    #    Passwort via Env-Var, nie als Argument (Secrets-Hygiene).
    - |
      echo "=== Realm-Import via kcadm ==="
      docker exec -e KCADM_PW="${KC_BOOTSTRAP_ADMIN_PASSWORD}" vectiscan-keycloak-1 bash -c '
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://localhost:8080 \
          --realm master \
          --user admin \
          --password "$KCADM_PW" 2>&1 && \
        /opt/keycloak/bin/kcadm.sh get realms/vectiscan 2>/dev/null | grep -q vectiscan \
          && echo "Realm vectiscan existiert bereits (IGNORE_EXISTING)" \
          || /opt/keycloak/bin/kcadm.sh create realms \
               -f /opt/keycloak/data/import/vectiscan-realm.json 2>&1 \
          && echo "Realm-Import OK" || echo "Realm-Import FEHLER"
      '
    # Cleanup: gerenderte Realm-JSON (enthaelt Client-Secrets) nach Import entfernen.
    # Der :ro Bind-Mount verhindert Loeschen von innen; daher rm auf dem Host.
    - rm -f ${DEPLOY_PATH}/keycloak/import/vectiscan-realm.json && echo "Realm-Import-Datei bereinigt."
    # 6) Verifikation: OIDC-Discovery vom Host
    - 'echo "=== OIDC-Discovery extern (Browser-Pfad) ==="'
    - |
      DISC="https://id.vectigal.tech/realms/vectiscan/.well-known/openid-configuration"
      CODE=$(docker run --rm curlimages/curl:8.8.0 -s -o /dev/null -w '%{http_code}' --max-time 20 "$DISC" 2>/dev/null || echo ERR)
      echo "GET $DISC -> $CODE (erwartet: 200)"
    # 7) VEC-439 C3: oauth2-proxy starten (Forward-Auth-Bruecke fuer status + /admin).
    #    Braucht den importierten Realm (OIDC-Discovery oben 200). KEYCLOAK_OAUTH2_PROXY_SECRET
    #    + OAUTH2_PROXY_COOKIE_SECRET kommen als maskierte CI-Vars aus der Job-Shell-Env und
    #    werden von `docker compose` direkt interpoliert (wie KC_DB_PASSWORD beim keycloak-Step,
    #    oben) — kein Schreiben ins Host-.env noetig (Secret-Hygiene).
    - 'echo "=== VEC-439 C3: oauth2-proxy starten ==="'
    - COMPOSE_PROFILES=crm,sso TAG=${TAG:-latest} docker compose up -d --no-build oauth2-proxy
    - |
      echo "=== Warte auf oauth2-proxy /ping (bis 90s) ==="
      # oauth2-proxy = Distroless (kein wget/sh -> kein docker exec). Pruefung via
      # curl-Helper im externen proxy-net gegen den Service-Alias `oauth2-proxy`.
      # /ping ist key-frei + unauthentifiziert; 200 = Prozess up + OIDC-Discovery geladen.
      OK=NO
      for i in $(seq 1 9); do
        STATUS=$(docker run --rm --network proxy-net curlimages/curl:8.8.0 -s -o /dev/null \
          -w '%{http_code}' --max-time 8 http://oauth2-proxy:4180/ping 2>/dev/null || echo ERR)
        echo "Attempt $i: ping=$STATUS"
        if [ "$STATUS" = "200" ]; then OK=YES; echo "oauth2-proxy UP!"; break; fi
        sleep 10
      done
      docker compose ps oauth2-proxy
      if [ "$OK" != "YES" ]; then
        echo "WARN: oauth2-proxy /ping nicht 200 — Logs:"; docker logs --tail 40 vectiscan-oauth2-proxy-1 2>&1 || true
      fi
    - echo "=== FERTIG C1+C3 — Live-QA/Security siehe VEC-441 (C5) ==="
  environment:
    name: production
    url: https://id.vectigal.tech

# =============================================================================
# VEC-470 — Keycloak: einen User idempotent in die Gruppe `vectiscan-admin`
# aufnehmen. Ohne diese Mitgliedschaft liefert oauth2-proxy (--allowed-group=
# vectiscan-admin) nach erfolgreichem Keycloak-Login ein *403* auf /admin — die
# Traefik-errors-Middleware faengt aber nur 401 ab, also sieht der User einen
# rohen 403 ("Admin-Freigabebereich oeffnet nicht"). Der Realm-Import legt KEINE
# User an und `defaultGroups` ist leer, daher muss jeder Admin explizit zugewiesen
# werden. Dieser Job macht das reproduzierbar + idempotent statt Klick im Admin-UI.
#
# Voraussetzung:
#   KC_BOOTSTRAP_ADMIN_PASSWORD  (maskierte CI-Var, wie ops-keycloak-provision)
#   KC_ADMIN_EMAIL               E-Mail des Ziel-Users (als Pipeline-Variable beim
#                                manuellen Run setzen). Der User muss im Realm
#                                bereits existieren (min. 1x eingeloggt / vom Admin
#                                angelegt) — dieser Job legt KEINE Accounts an.
# Reversibel (Two-way-Door): Entzug = kcadm delete users/<id>/groups/<gid>.
# =============================================================================
ops-keycloak-grant-admin:
  extends: .ops-base
  needs: []
  script:
    - |
      if [ -z "${KC_BOOTSTRAP_ADMIN_PASSWORD}" ]; then
        echo "FATAL: KC_BOOTSTRAP_ADMIN_PASSWORD fehlt (maskierte CI-Var)."; exit 1
      fi
      if [ -z "${KC_ADMIN_EMAIL}" ]; then
        echo "FATAL: KC_ADMIN_EMAIL fehlt. Beim manuellen Run als Pipeline-Variable setzen"
        echo "       (E-Mail des Users, der Admin-Zugriff bekommen soll)."; exit 1
      fi
      echo "Ziel-User: ${KC_ADMIN_EMAIL} -> Gruppe vectiscan-admin (Realm vectiscan)"
    - |
      docker exec -e KCADM_PW="${KC_BOOTSTRAP_ADMIN_PASSWORD}" -e EMAIL="${KC_ADMIN_EMAIL}" \
        vectiscan-keycloak-1 bash -c '
        set -e
        K=/opt/keycloak/bin/kcadm.sh
        $K config credentials --server http://localhost:8080 --realm master --user admin --password "$KCADM_PW" >/dev/null
        USERID=$($K get users -r vectiscan -q email="$EMAIL" --fields id --format csv --noquotes 2>/dev/null | head -1 | tr -d "\r")
        if [ -z "$USERID" ]; then
          echo "FATAL: kein User mit E-Mail $EMAIL im Realm vectiscan gefunden."
          echo "       Der Account muss zuerst existieren (User loggt sich 1x ein ODER"
          echo "       Admin legt ihn in der Keycloak-Konsole an). Dieser Job legt keine an."
          exit 2
        fi
        GID=$($K get groups -r vectiscan --fields id,name --format csv --noquotes 2>/dev/null | grep "vectiscan-admin" | head -1 | cut -d, -f1)
        if [ -z "$GID" ]; then
          echo "FATAL: Gruppe vectiscan-admin nicht gefunden — Realm nicht provisioniert (ops-keycloak-provision)."
          exit 3
        fi
        echo "User-ID=$USERID Group-ID=$GID — fuege hinzu (idempotent)..."
        $K update "users/$USERID/groups/$GID" -r vectiscan -s realm=vectiscan -s userId="$USERID" -s groupId="$GID" -n
        echo "=== Verifikation: Gruppen des Users ==="
        MEMBER=$($K get "users/$USERID/groups" -r vectiscan --fields name --format csv --noquotes 2>/dev/null | tr -d "\r")
        echo "$MEMBER"
        echo "$MEMBER" | grep -q "vectiscan-admin" \
          && echo "OK: $EMAIL ist jetzt in vectiscan-admin — /admin-Edge-Gate (403) entblockt." \
          || { echo "FEHLER: Mitgliedschaft nach update nicht bestaetigt."; exit 4; }
      '
  environment:
    name: production
    url: https://id.vectigal.tech

# =============================================================================
# VEC-473 — Diagnose: Realm-User im Realm `vectiscan` auflisten. Reiner Read-
# only-Ops-Job, um vor `ops-keycloak-grant-admin` die tatsaechliche E-Mail/
# Username eines Accounts zu ermitteln (Grant matcht exakt per email). Optional
# KC_USER_SEARCH als Pipeline-Variable (kcadm `-q search=`), sonst alle User.
#   KC_BOOTSTRAP_ADMIN_PASSWORD  (maskierte CI-Var, wie ops-keycloak-provision)
# =============================================================================
ops-keycloak-list-users:
  extends: .ops-base
  needs: []
  script:
    - |
      if [ -z "${KC_BOOTSTRAP_ADMIN_PASSWORD}" ]; then
        echo "FATAL: KC_BOOTSTRAP_ADMIN_PASSWORD fehlt (maskierte CI-Var)."; exit 1
      fi
      echo "Realm vectiscan — User-Liste (Suchbegriff: '${KC_USER_SEARCH:-<alle>}')"
    - |
      docker exec -e KCADM_PW="${KC_BOOTSTRAP_ADMIN_PASSWORD}" -e SEARCH="${KC_USER_SEARCH:-}" \
        vectiscan-keycloak-1 bash -c '
        set -e
        K=/opt/keycloak/bin/kcadm.sh
        $K config credentials --server http://localhost:8080 --realm master --user admin --password "$KCADM_PW" >/dev/null
        if [ -n "$SEARCH" ]; then
          $K get users -r vectiscan -q search="$SEARCH" --fields id,username,email,enabled,emailVerified --format csv --noquotes 2>/dev/null
        else
          $K get users -r vectiscan --fields id,username,email,enabled,emailVerified --format csv --noquotes 2>/dev/null
        fi
        echo "=== Ende User-Liste ==="
      '
  environment:
    name: production
    url: https://id.vectigal.tech

# =============================================================================
# VEC-473/VEC-470 — First-Admin-Bootstrap: Keycloak-User im Realm `vectiscan`
# ANLEGEN (falls nicht vorhanden), temporaeres Passwort setzen und idempotent
# in Gruppe `vectiscan-admin` aufnehmen. Grund: Realm-Import seedet KEINE User,
# `ops-keycloak-grant-admin` fand den Ziel-User daher nicht (Realm leer). Dieser
# Job schliesst die Luecke fuer den ersten Admin. Two-way-Door (User loeschbar).
#   KC_BOOTSTRAP_ADMIN_PASSWORD  (maskierte CI-Var, wie ops-keycloak-provision)
#   KC_ADMIN_EMAIL               E-Mail/Username des Ziel-Admins (Pipeline-Var)
# Das temporaere Passwort wird IM Job zufaellig erzeugt, 1x geloggt und MUSS beim
# ersten Login geaendert werden (temporary=true).
# =============================================================================
ops-keycloak-create-admin:
  extends: .ops-base
  needs: []
  script:
    - |
      if [ -z "${KC_BOOTSTRAP_ADMIN_PASSWORD}" ]; then
        echo "FATAL: KC_BOOTSTRAP_ADMIN_PASSWORD fehlt (maskierte CI-Var)."; exit 1
      fi
      if [ -z "${KC_ADMIN_EMAIL}" ]; then
        echo "FATAL: KC_ADMIN_EMAIL fehlt (Pipeline-Variable)."; exit 1
      fi
      echo "First-Admin-Bootstrap: ${KC_ADMIN_EMAIL} -> Realm vectiscan / Gruppe vectiscan-admin"
    - |
      docker exec -e KCADM_PW="${KC_BOOTSTRAP_ADMIN_PASSWORD}" -e EMAIL="${KC_ADMIN_EMAIL}" \
        vectiscan-keycloak-1 bash -c '
        set -e
        K=/opt/keycloak/bin/kcadm.sh
        $K config credentials --server http://localhost:8080 --realm master --user admin --password "$KCADM_PW" >/dev/null
        USERID=$($K get users -r vectiscan -q email="$EMAIL" --fields id --format csv --noquotes 2>/dev/null | head -1 | tr -d "\r")
        if [ -z "$USERID" ]; then
          echo "User existiert nicht — lege an..."
          $K create users -r vectiscan -s username="$EMAIL" -s email="$EMAIL" -s enabled=true -s emailVerified=true >/dev/null
          USERID=$($K get users -r vectiscan -q email="$EMAIL" --fields id --format csv --noquotes 2>/dev/null | head -1 | tr -d "\r")
          echo "Angelegt: User-ID=$USERID"
        else
          echo "User existiert bereits: User-ID=$USERID (kein Re-Create)"
        fi
        [ -z "$USERID" ] && { echo "FATAL: User-Anlage fehlgeschlagen."; exit 2; }
        TMPPW="Vs-$(tr -dc A-Za-z0-9 </dev/urandom | head -c 14)!"
        $K set-password -r vectiscan --username "$EMAIL" --new-password "$TMPPW" --temporary
        GID=$($K get groups -r vectiscan --fields id,name --format csv --noquotes 2>/dev/null | grep "vectiscan-admin" | head -1 | cut -d, -f1)
        [ -z "$GID" ] && { echo "FATAL: Gruppe vectiscan-admin nicht gefunden (Realm nicht provisioniert)."; exit 3; }
        $K update "users/$USERID/groups/$GID" -r vectiscan -s realm=vectiscan -s userId="$USERID" -s groupId="$GID" -n
        MEMBER=$($K get "users/$USERID/groups" -r vectiscan --fields name --format csv --noquotes 2>/dev/null | tr -d "\r")
        echo "=== Verifikation Gruppen: $MEMBER ==="
        echo "$MEMBER" | grep -q "vectiscan-admin" || { echo "FATAL: Mitgliedschaft nicht bestaetigt."; exit 4; }
        echo "############################################################"
        echo "# LOGIN: $EMAIL"
        echo "# TEMP-PASSWORT (einmalig, beim 1. Login aendern): $TMPPW"
        echo "############################################################"
        echo "OK: $EMAIL angelegt + in vectiscan-admin — /admin-Edge-Gate (403) entblockt."
      '
  environment:
    name: production
    url: https://id.vectigal.tech

# =============================================================================
# VEC-470/VEC-473 — Keycloak: fehlenden Client-Scope `groups` anlegen + dem
# Client `vectiscan-oauth2-proxy` als Default-Scope zuweisen. Ursache des
# Login-Fehlers: oauth2-proxy fordert `scope=openid profile email groups`, der
# Realm kennt aber keinen Scope `groups` -> Keycloak antwortet `invalid_scope`
# -> Redirect auf /oauth2/callback?error=invalid_scope -> 403 (kein Login moeglich,
# daher war der Realm auch leer). Idempotent, Read-check vor Create. Two-way-Door.
#   KC_BOOTSTRAP_ADMIN_PASSWORD  (maskierte CI-Var)
# =============================================================================
ops-keycloak-fix-groups-scope:
  extends: .ops-base
  needs: []
  script:
    - |
      if [ -z "${KC_BOOTSTRAP_ADMIN_PASSWORD}" ]; then
        echo "FATAL: KC_BOOTSTRAP_ADMIN_PASSWORD fehlt (maskierte CI-Var)."; exit 1
      fi
    - |
      docker exec -e KCADM_PW="${KC_BOOTSTRAP_ADMIN_PASSWORD}" \
        vectiscan-keycloak-1 bash -c '
        set -e
        K=/opt/keycloak/bin/kcadm.sh
        $K config credentials --server http://localhost:8080 --realm master --user admin --password "$KCADM_PW" >/dev/null
        CLIENT=vectiscan-oauth2-proxy
        # kein awk im Container -> grep/cut. Zeilenformat: <id>,<name>
        scope_id() { $K get client-scopes -r vectiscan --fields id,name --format csv --noquotes 2>/dev/null | tr -d "\r" | grep ",groups$" | head -1 | cut -d, -f1; }
        SID=$(scope_id || true)
        if [ -z "$SID" ]; then
          echo "Client-Scope groups fehlt — lege an..."
          $K create client-scopes -r vectiscan \
            -s name=groups -s protocol=openid-connect \
            -s "attributes.\"include.in.token.scope\"=true" \
            -s "attributes.\"display.on.consent.screen\"=false" >/dev/null
          SID=$(scope_id || true)
          echo "Angelegt: scope-id=$SID"
        else
          echo "Client-Scope groups existiert bereits: scope-id=$SID"
        fi
        [ -z "$SID" ] && { echo "FATAL: scope-id nicht ermittelbar."; exit 2; }
        # Mapper idempotent sicherstellen
        HASMAP=$($K get "client-scopes/$SID/protocol-mappers/models" -r vectiscan --fields name --format csv --noquotes 2>/dev/null | tr -d "\r" | grep -c "^groups$" || true)
        if [ "$HASMAP" = "0" ]; then
          echo "Group-Membership-Mapper fehlt — lege an..."
          $K create "client-scopes/$SID/protocol-mappers/models" -r vectiscan \
            -s name=groups -s protocol=openid-connect -s protocolMapper=oidc-group-membership-mapper \
            -s "config.\"claim.name\"=groups" -s "config.\"full.path\"=false" \
            -s "config.\"id.token.claim\"=true" -s "config.\"access.token.claim\"=true" \
            -s "config.\"userinfo.token.claim\"=true" >/dev/null
        else
          echo "Mapper groups existiert bereits."
        fi
        CID=$($K get clients -r vectiscan -q clientId=$CLIENT --fields id --format csv --noquotes 2>/dev/null | tr -d "\r" | head -1)
        [ -z "$CID" ] && { echo "FATAL: Client $CLIENT nicht gefunden."; exit 3; }
        echo "Client $CLIENT id=$CID — weise groups als Default-Scope zu (idempotent)..."
        $K update "clients/$CID/default-client-scopes/$SID" -r vectiscan >/dev/null 2>&1 || true
        ASSIGNED=$($K get "clients/$CID/default-client-scopes" -r vectiscan --fields name --format csv --noquotes 2>/dev/null | tr -d "\r" | tr "\n" " ")
        echo "=== Default-Client-Scopes von $CLIENT: $ASSIGNED ==="
        echo "$ASSIGNED" | grep -qw groups \
          && echo "OK: groups-Scope aktiv fuer $CLIENT — invalid_scope behoben, Login moeglich." \
          || { echo "FEHLER: groups-Scope nach Zuweisung nicht bestaetigt."; exit 4; }
      '
  environment:
    name: production
    url: https://id.vectigal.tech

# =============================================================================
# VEC-378 — Admin-Release für QA-WebCheck-Order (Re-Scan VEC-376)
# Genehmigt Target für Order 46ce8dcc-4236-4c15-895a-ad32586d484a und queued
# den WebCheck-Scan. Einmaliger Ops-Job; wird per API-Pipeline getriggert.
# Voraussetzung: ADMIN_EMAIL + ADMIN_PASSWORD als CI-Variablen gesetzt.
# =============================================================================
ops-admin-release-vec378:
  stage: ops
  tags: [vectigal]
  needs: []
  allow_failure: true
  variables:
    ORDER_ID: "46ce8dcc-4236-4c15-895a-ad32586d484a"
    TARGET_ID: "b46a509a-a061-4464-8896-d0bb13ce49dc"
    API_BASE: "https://scan-api.vectigal.tech"
  rules:
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - 'echo "=== VEC-378 Admin-Release: ${ORDER_ID} ==="'
    - |
      if [ -z "${ADMIN_EMAIL}" ] || [ -z "${ADMIN_PASSWORD}" ]; then
        echo "FATAL: ADMIN_EMAIL oder ADMIN_PASSWORD nicht gesetzt (CI-Variable fehlt)"
        exit 1
      fi
    - |
      TOKEN=$(curl -sf -X POST "${API_BASE}/api/auth/login" \
        -H "Content-Type: application/json" \
        -d "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASSWORD}\"}" \
        | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
      if [ -z "$TOKEN" ]; then
        echo "FATAL: Admin-Login fehlgeschlagen (kein Token in Response)"
        exit 1
      fi
      echo "OK: Admin-Token erhalten (Länge=${#TOKEN})"
    - |
      REVIEW=$(curl -sf -X GET "${API_BASE}/api/admin/review/order/${ORDER_ID}" \
        -H "Authorization: Bearer ${TOKEN}")
      echo "Review-Response (gekürzt): $(echo "$REVIEW" | head -c 500)"
      echo "OK: Target-ID=${TARGET_ID} (hardcoded aus Job-Run-Trace)"
    - |
      APPROVE=$(curl -sf -X POST "${API_BASE}/api/admin/targets/${TARGET_ID}/approve" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{"notes":"VEC-378 QA-Re-Scan, board-vetted target dortmund-beach.com"}')
      echo "Approve-Response: ${APPROVE}"
      if echo "$APPROVE" | grep -q '"success":true'; then
        echo "OK: Target approved"
      else
        echo "WARN: Approve-Response enthält kein success:true — manuell prüfen"
      fi
    - |
      RELEASE=$(curl -sf -X POST "${API_BASE}/api/admin/orders/${ORDER_ID}/release" \
        -H "Authorization: Bearer ${TOKEN}" \
        -H "Content-Type: application/json")
      echo "Release-Response: ${RELEASE}"
      if echo "$RELEASE" | grep -q '"success":true'; then
        echo "=== RELEASE ERFOLGREICH: Order gequeued, WebCheck startet ==="
      else
        echo "FATAL: Release fehlgeschlagen — Response: ${RELEASE}"
        exit 1
      fi
    - 'echo "=== VEC-378 DONE: Scan queued, ~15-20 Min bis report_complete ==="'

# =============================================================================
# VEC-378 Ops-Job: Order-Status prüfen (report_complete?)
# Einmaliger Check-Job; per API-Pipeline triggerbar.
# =============================================================================
ops-check-order-status-vec378:
  stage: ops
  tags: [vectigal]
  needs: []
  allow_failure: true
  variables:
    ORDER_ID: "46ce8dcc-4236-4c15-895a-ad32586d484a"
    API_BASE: "https://scan-api.vectigal.tech"
  rules:
    - if: $CI_PIPELINE_SOURCE == "api"
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
