# =============================================================================
# VectiScan CI/CD Pipeline
# =============================================================================
# Multi-image build pipeline for the VectiScan security scanning platform.
# Builds four services, scans with Trivy, runs tests, and deploys via
# docker compose on vectigal-docker02.
# =============================================================================

variables:
  REGISTRY: ghcr.io
  BASE_IMAGE: ${REGISTRY}/dc-77/vectiscan
  APP_NAME: vectiscan
  DEPLOY_PATH: /opt/apps/${APP_NAME}

stages:
  - build
  - scan
  - test
  - deploy

# =============================================================================
# BUILD STAGE — Build & push Docker images for all four services
# =============================================================================

.build-base:
  stage: build
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    - docker build -t ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA} -t ${BASE_IMAGE}/${SERVICE}:latest ${SERVICE}/
    - docker push ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BASE_IMAGE}/${SERVICE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

build-frontend:
  extends: .build-base
  variables:
    SERVICE: frontend

build-api:
  extends: .build-base
  variables:
    SERVICE: api

build-scan-worker:
  extends: .build-base
  variables:
    SERVICE: scan-worker

build-report-worker:
  extends: .build-base
  variables:
    SERVICE: report-worker

# =============================================================================
# SCAN STAGE — Trivy vulnerability scan for each image (CRITICAL only)
# =============================================================================

.trivy-base:
  stage: scan
  tags: [vectigal]
  script:
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed ${BASE_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

trivy-frontend:
  extends: .trivy-base
  variables:
    SERVICE: frontend

trivy-api:
  extends: .trivy-base
  variables:
    SERVICE: api

trivy-scan-worker:
  extends: .trivy-base
  variables:
    SERVICE: scan-worker

trivy-report-worker:
  extends: .trivy-base
  variables:
    SERVICE: report-worker

# =============================================================================
# TEST STAGE — Unit tests for API and both workers
# =============================================================================

test-api:
  stage: test
  tags: [vectigal]
  image: node:20-alpine
  script:
    - cd api && npm ci && npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-scan-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd scan-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt pytest && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

test-report-worker:
  stage: test
  tags: [vectigal]
  image: python:3.12-slim
  script:
    - cd report-worker && python3 -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt pytest && pytest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# DEPLOY STAGE — Rolling deploy, manual deploy, and rollback
# =============================================================================

.deploy-base:
  tags: [vectigal]
  before_script:
    - echo "${GHCR_TOKEN}" | docker login ghcr.io -u dc-77 --password-stdin
  script:
    - cd ${DEPLOY_PATH}
    - cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
    - cp .env .env.bak 2>/dev/null || true
    - |
      cat > .env <<ENVEOF
      DB_NAME=${DB_NAME}
      DB_USER=${DB_USER}
      DB_PASSWORD=${DB_PASSWORD}
      MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      VECTISCAN_ACCESS_PASSWORD=${VECTISCAN_ACCESS_PASSWORD}
      ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      ENVEOF
    - sed -i 's/^[[:space:]]*//' .env
    - cp ${CI_PROJECT_DIR}/docker-compose.yml .
    - docker compose pull
    - TAG=${TAG} docker compose up -d --remove-orphans
    # Give all 7 containers time to pass health checks
    - sleep 15
    - docker compose ps
    - docker compose ps --format json | python3 -c "import sys,json; containers=[json.loads(line) for line in sys.stdin if line.strip()]; unhealthy=[c['Name'] for c in containers if c.get('Health','') not in ('','healthy') or c.get('State')!='running']; print('Unhealthy:',unhealthy) if unhealthy else print('All healthy'); exit(1 if unhealthy else 0)"
  environment:
    name: production
    url: https://scan.vectigal.tech

deploy-auto:
  extends: .deploy-base
  stage: deploy
  variables:
    TAG: latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-manual:
  extends: .deploy-base
  stage: deploy
  variables:
    TAG: ${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

rollback:
  stage: deploy
  tags: [vectigal]
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - cd ${DEPLOY_PATH}
    - cp docker-compose.yml.bak docker-compose.yml
    - cp .env.bak .env
    - docker compose pull
    - docker compose up -d --remove-orphans
    - sleep 15
    - docker compose ps
  environment:
    name: production
    url: https://scan.vectigal.tech
